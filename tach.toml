source_roots = ["src"]
root_module = "ignore"

# PR governance treats AI bad-smell gates as red-zone quality boundaries;
# suppression and import-path gate changes must stay focused and carry focused tests.
# Dependency-control files are treated as a separate governance layer; dependency
# changes must not hide inside product or test-only PRs.
# Prompt and runtime behavior changes must be split so prompt drift cannot hide
# inside runtime implementation diffs.
# Config/env changes must be isolated from behavior changes so rollout defaults
# cannot mask runtime or provider behavior changes.
# Privacy gate changes protect provider payload, header, cookie, and token
# leakage boundaries and must carry focused red/green tests.
# CI type checks include governance tools so gate scripts stay typed as they
# become part of the repository safety boundary.
# Red-zone refactors require a structured review manifest and explicit
# red-zone verification instead of ad hoc admin overrides.

[[modules]]
path = "seektalent.clients"
depends_on = []

[[modules]]
path = "seektalent.candidate_quality"
depends_on = []

[[modules]]
path = "seektalent.candidate_feedback"
depends_on = ["seektalent.candidate_quality"]

[[modules]]
path = "seektalent.cache"
depends_on = []

[[modules]]
path = "seektalent.core"
depends_on = []

[[modules]]
path = "seektalent.controller"
depends_on = ["seektalent.retrieval"]

[[modules]]
path = "seektalent.finalize"
depends_on = []

[[modules]]
path = "seektalent.reflection"
depends_on = ["seektalent.candidate_quality"]

[[modules]]
path = "seektalent.requirements"
depends_on = ["seektalent.cache"]

[[modules]]
path = "seektalent.retrieval"
depends_on = [
  "seektalent.core",
]

# Provider boundary is a red-zone integration surface. Providers may depend on
# clients, core contracts, and retrieval primitives, but not runtime DTOs.
[[modules]]
path = "seektalent.providers"
depends_on = [
  "seektalent.clients",
  "seektalent.core",
  "seektalent.opencli_browser",
  "seektalent.retrieval",
  "seektalent.source_contracts",
]

[[modules]]
path = "seektalent.opencli_browser"
depends_on = []

# Runtime owns orchestration and must use source-neutral contracts instead of
# importing concrete CTS/Liepin providers.
[[modules]]
path = "seektalent.runtime"
depends_on = [
  "seektalent.cache",
  "seektalent.candidate_quality",
  "seektalent.clients",
  "seektalent.candidate_feedback",
  "seektalent.controller",
  "seektalent.core",
  "seektalent.finalize",
  "seektalent.reflection",
  "seektalent.requirements",
  "seektalent.retrieval",
  "seektalent.scoring",
  "seektalent.source_contracts",
]

[[modules]]
path = "seektalent.scoring"
depends_on = [
  "seektalent.cache",
  "seektalent.candidate_quality",
]

[[modules]]
path = "seektalent.source_contracts"
depends_on = []

[[modules]]
path = "seektalent.source_adapters"
depends_on = [
  "seektalent.core",
  "seektalent.providers",
  "seektalent.retrieval",
  "seektalent.runtime",
  "seektalent.source_contracts",
  "seektalent.sources",
]

[[modules]]
path = "seektalent_runtime_control"
depends_on = [
  "seektalent.runtime",
  "seektalent.source_adapters",
  "seektalent.source_contracts",
]

[[modules]]
path = "seektalent_conversation_agent"
depends_on = [
  "seektalent_runtime_control",
]

[[modules]]
path = "seektalent_agent_memory"
depends_on = []

[[modules]]
path = "seektalent.sources"
depends_on = [
  "seektalent.core",
  "seektalent.providers",
  "seektalent.source_contracts",
]

[[modules]]
path = "seektalent_ui"
depends_on = [
  "seektalent.candidate_quality",
  "seektalent_agent_memory",
  "seektalent_conversation_agent",
  "seektalent_runtime_control",
  "seektalent_workbench_v2",
  "seektalent.providers",
  "seektalent.runtime",
  "seektalent.source_adapters",
]

[[modules]]
path = "seektalent_workbench_v2"
depends_on = [
  "seektalent.candidate_quality",
  "seektalent_runtime_control",
]
