source_roots = ["src"]
root_module = "ignore"

# PR governance treats AI bad-smell gates as red-zone quality boundaries;
# suppression and import-path gate changes must stay focused and carry focused tests.
# Dependency-control files are treated as a separate governance layer; dependency
# changes must not hide inside product or test-only PRs.

[[modules]]
path = "seektalent.clients"
depends_on = []

[[modules]]
path = "seektalent.candidate_feedback"
depends_on = []

[[modules]]
path = "seektalent.cache"
depends_on = []

[[modules]]
path = "seektalent.core"
depends_on = []

[[modules]]
path = "seektalent.controller"
depends_on = ["seektalent.retrieval"]

[[modules]]
path = "seektalent.finalize"
depends_on = []

[[modules]]
path = "seektalent.reflection"
depends_on = []

[[modules]]
path = "seektalent.requirements"
depends_on = ["seektalent.cache"]

[[modules]]
path = "seektalent.retrieval"
depends_on = []

# Provider boundary is a red-zone integration surface; PR governance owns
# explicit security-remediation handling for cross-boundary provider changes.
# Liepin provider context is a controlled runtime/provider contract; provider
# code may consume `seektalent.runtime.liepin_context` but must not invent
# ad hoc raw account-binding payload shapes.
# Runtime source plans and public requests must expose only the typed context's
# safe posture, never raw provider account binding material.
[[modules]]
path = "seektalent.providers"
depends_on = [
  "seektalent.clients",
  "seektalent.core",
  "seektalent.retrieval",
  "seektalent.runtime",
]

[[modules]]
path = "seektalent.runtime"
depends_on = [
  "seektalent.cache",
  "seektalent.clients",
  "seektalent.candidate_feedback",
  "seektalent.controller",
  "seektalent.core",
  "seektalent.finalize",
  "seektalent.providers",
  "seektalent.reflection",
  "seektalent.requirements",
  "seektalent.retrieval",
  "seektalent.scoring",
]

[[modules]]
path = "seektalent.scoring"
depends_on = ["seektalent.cache"]

[[modules]]
path = "seektalent_ui"
depends_on = [
  "seektalent.providers",
  "seektalent.runtime",
]
