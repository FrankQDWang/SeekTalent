
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeekTalent 启动中心 - 交互原型</title>
  <style>
    :root {
      --bg: #f3f2ff;
      --panel: #fefeff;
      --panel-2: #f8f8ff;
      --ink: #17213d;
      --muted: #7a86a5;
      --soft: #ebe9ff;
      --line: #e7e8f6;
      --purple: #675cff;
      --purple-2: #7d72ff;
      --purple-soft: #efedff;
      --navy: #17213d;
      --green: #23ad76;
      --green-soft: #e8f8f1;
      --amber: #d9901c;
      --amber-soft: #fff7e4;
      --red: #dc5260;
      --red-soft: #fff0f3;
      --blue: #4f7dff;
      --blue-soft: #eef4ff;
      --shadow: 0 18px 42px rgba(72, 77, 128, 0.08);
      --shadow-soft: 0 8px 20px rgba(47, 52, 94, 0.07);
      --radius-xl: 14px;
      --radius-lg: 12px;
      --radius-md: 10px;
      --radius-sm: 8px;
      --sidebar: 260px;
      --font: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      overflow: hidden;
    }

    button, input, textarea { font: inherit; }
    button { cursor: pointer; border: 0; }
    button:disabled { cursor: not-allowed; opacity: 0.58; }

    .app-shell {
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      height: 100vh;
      width: 100vw;
      background: var(--bg);
    }

    .sidebar {
      position: relative;
      padding: 14px 10px 20px;
      background: #f0efff;
      border-right: 1px solid rgba(229, 228, 248, 0.8);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .traffic {
      display: flex;
      gap: 8px;
      padding: 0 3px 10px;
      height: 25px;
      align-items: center;
    }
    .dot { width: 12px; height: 12px; border-radius: 999px; background: #dddde7; border: 1px solid #c8c9d7; }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 1px 12px 2px;
    }
    .brand-mark {
      width: 30px; height: 30px; border-radius: 9px 14px 9px 9px;
      background: linear-gradient(135deg, #665dff, #6c58e8);
      box-shadow: 0 8px 18px rgba(99, 91, 255, .2);
      position: relative;
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      left: 8px; top: 8px;
      width: 13px; height: 10px;
      border-radius: 0 999px 999px 0;
      background: #fff;
      opacity: .95;
    }
    .brand-name { font-size: 34px; line-height: 1; font-weight: 800; letter-spacing: 0; color: #17213d; }
    .brand-badge { align-self: flex-start; margin-left: -4px; margin-top: -8px; padding: 4px 8px; font-size: 11px; font-weight: 700; color: #fff; background: #8d83ff; border-radius: 8px 8px 8px 2px; }

    .side-collapse {
      position: absolute;
      top: 52px; right: 24px;
      width: 22px; height: 22px;
      display: grid; place-items: center;
      color: #273452;
    }

    .new-task {
      margin: 4px 0 2px;
      height: 36px;
      border-radius: 999px;
      background: #dfdcff;
      color: #655bff;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .nav-list { display: flex; flex-direction: column; gap: 9px; }
    .nav-item {
      height: 41px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border-radius: 10px;
      color: #394666;
      font-weight: 700;
      font-size: 14px;
      user-select: none;
      transition: .18s ease;
    }
    .nav-item:hover { background: rgba(255,255,255,.72); }
    .nav-item.active {
      background: #fff;
      color: #18233f;
      box-shadow: 0 8px 22px rgba(45, 52, 90, .06);
      border: 1px solid rgba(237, 236, 250, .95);
    }
    .nav-item.seek.active {
      background: #fff;
      box-shadow: 0 8px 22px rgba(45, 52, 90, .06);
    }
    .nav-icon { width: 18px; height: 18px; display: inline-grid; place-items: center; color: #39466a; }
    .nav-divider { height: 1px; background: #e2e1f2; margin: 2px 0 8px; }
    .sidebar-spacer { flex: 1; }
    .side-bottom { display: flex; justify-content: space-between; align-items: center; padding: 0 10px 4px; color: #39466a; }
    .avatar {
      width: 24px; height: 24px; border-radius: 999px;
      background: linear-gradient(135deg, #735eff, #796cff);
      color: #fff; display: grid; place-items: center; font-size: 13px; font-weight: 800;
      box-shadow: 0 8px 18px rgba(99, 91, 255, .23);
    }

    .workspace {
      position: relative;
      padding: 40px 10px 0 0;
      min-width: 760px;
      overflow: hidden;
    }
    .content-card {
      height: calc(100vh - 40px);
      margin-right: 10px;
      background: var(--panel);
      border-radius: 14px 14px 0 0;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .main-header {
      padding: 26px 26px 12px;
      border-bottom: 0;
      background: var(--panel);
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
    }
    .title-group { min-width: 0; }
    .title-group h1 {
      margin: 0;
      display: inline;
      font-size: 24px;
      letter-spacing: 0;
      color: #17213d;
    }
    .title-group p {
      display: inline;
      margin: 0 0 0 14px;
      color: #7c88a6;
      font-weight: 700;
      line-height: 1.55;
      font-size: 14px;
    }
    .inline-key { font-weight: 800; color: #3e4867; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
    .chip {
      display: inline-flex; align-items: center; gap: 7px;
      height: 28px; padding: 0 10px;
      border-radius: 9px;
      background: #f1f2fa;
      color: #3f4a69;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .chip.purple { background: var(--purple-soft); color: #5147d9; }
    .chip.green { background: var(--green-soft); color: #0d8a5a; }
    .chip.amber { background: var(--amber-soft); color: #9b6900; }
    .chip.red { background: var(--red-soft); color: #bd3041; }
    .chip.blue { background: var(--blue-soft); color: #2366d5; }

    .tabbar {
      display: flex;
      width: fit-content;
      gap: 0;
      padding: 4px;
      margin: 4px 26px 16px;
      border-radius: 10px;
      background: #f0f1f6;
    }
    .tab-btn {
      height: 34px;
      border-radius: 8px;
      padding: 0 20px;
      background: transparent;
      color: #6e7895;
      font-weight: 850;
      transition: .18s ease;
    }
    .tab-btn:hover { background: #f5f6ff; color: #39436a; }
    .tab-btn.active { background: #fff; color: #18233f; box-shadow: 0 2px 8px rgba(33, 40, 72, .08); }

    .main-body {
      position: relative;
      flex: 1;
      overflow: auto;
      padding: 10px 26px 88px;
      background: var(--panel);
    }

    .welcome {
      min-height: 440px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 34px 20px;
    }
    .welcome-inner { max-width: 720px; }
    .illustration {
      position: relative;
      margin: 0 auto 22px;
      width: 144px; height: 98px;
    }
    .illu-base {
      position: absolute; left: 8px; right: 8px; bottom: 4px; height: 54px;
      border-radius: 50%; background: linear-gradient(180deg, rgba(99,91,255,.09), rgba(99,91,255,0));
    }
    .illu-folder {
      position: absolute; left: 27px; top: 35px; width: 76px; height: 50px;
      border-radius: 14px 14px 19px 19px;
      background: linear-gradient(135deg, #c7c0ff 0%, #7f73ff 100%);
      box-shadow: 0 22px 34px rgba(99,91,255,.25);
    }
    .illu-folder::before {
      content: ""; position: absolute; left: 13px; top: -10px; width: 42px; height: 16px;
      border-radius: 10px 10px 0 0;
      background: linear-gradient(135deg, #d8d3ff, #a59bff);
      transform: rotate(8deg);
    }
    .illu-doc {
      position: absolute; left: 52px; top: 11px; width: 50px; height: 58px;
      background: #fff; border-radius: 10px;
      box-shadow: 0 18px 28px rgba(81,76,154,.18);
      transform: rotate(2deg);
    }
    .illu-doc::before, .illu-doc::after {
      content: ""; position: absolute; left: 14px; right: 14px; height: 6px; border-radius: 999px; background: #e7e5ff;
    }
    .illu-doc::before { top: 18px; }
    .illu-doc::after { top: 34px; right: 22px; }
    .illu-search {
      position: absolute; right: 18px; bottom: 14px; width: 40px; height: 40px;
      border-radius: 999px; background: #fff;
      display: grid; place-items: center;
      box-shadow: 0 15px 28px rgba(99,91,255,.25);
    }
    .illu-search::before {
      content: ""; width: 18px; height: 18px; border: 4px solid #887cff; border-radius: 999px;
      transform: translate(-2px, -2px);
    }
    .illu-search::after {
      content: ""; position: absolute; width: 15px; height: 4px; border-radius: 999px; background: #887cff;
      transform: rotate(45deg) translate(12px, 12px);
    }
    .welcome h2 { margin: 0; font-size: 22px; color: #152142; letter-spacing: 0; }
    .welcome p { margin: 12px auto 0; max-width: 600px; color: #7a86a4; line-height: 1.75; font-weight: 650; }
    .welcome-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 28px; }

    .primary-btn, .secondary-btn, .ghost-btn, .danger-btn, .green-btn, .amber-btn {
      min-height: 38px;
      border-radius: 999px;
      padding: 0 16px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-weight: 850;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }
    .primary-btn { background: var(--purple); color: #fff; box-shadow: 0 8px 18px rgba(103, 92, 255, .18); }
    .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 22px rgba(103, 92, 255, .22); }
    .secondary-btn { background: #f2f3fa; color: #3d4968; }
    .secondary-btn:hover { background: #ebedf7; }
    .ghost-btn { background: transparent; color: #5e68e8; min-height: 36px; padding: 0 10px; }
    .ghost-btn:hover { background: var(--purple-soft); }
    .danger-btn { background: var(--red-soft); color: #c33a48; }
    .green-btn { background: #22a971; color: #fff; box-shadow: 0 10px 22px rgba(34, 169, 113, .16); }
    .green-btn:hover { transform: translateY(-1px); box-shadow: 0 13px 26px rgba(34,169,113,.2); }
    .amber-btn { background: #ffedc4; color: #8b5d00; }
    .tiny-btn {
      min-height: 30px; border-radius: 999px; padding: 0 12px;
      font-size: 12px; font-weight: 850; background: #f4f5fb; color: #485572;
      border: 1px solid #e6e8f4;
    }
    .tiny-btn:hover { background: #eceef9; }

    .prototype-switcher {
      margin: 0 auto;
      max-width: 700px;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 14px;
      border-radius: 16px;
      background: rgba(246,247,255,.88);
      border: 1px solid #eceeff;
    }
    .scenario-btn {
      height: 32px; padding: 0 12px; border-radius: 999px;
      color: #56617e; background: #fff; font-size: 12px; font-weight: 900;
      border: 1px solid #e6e8f6;
    }
    .scenario-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }

    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(320px, 430px) minmax(420px, 1fr);
      gap: 18px;
      align-items: start;
    }

    .dependency-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .dep-card {
      position: relative;
      overflow: hidden;
      padding: 12px;
      border-radius: 12px;
      background: #fff;
      border: 1px solid #e5e6f7;
      box-shadow: 0 8px 20px rgba(33,40,70,.045);
      transition: .18s ease;
      cursor: pointer;
    }
    .dep-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-soft); }
    .dep-card.selected {
      border-color: #beb9ff;
      background: #fbfaff;
      box-shadow: 0 10px 24px rgba(99, 91, 255, .1);
    }
    .dep-card::before {
      content: none;
    }
    .dep-head { display: flex; justify-content: space-between; gap: 10px; align-items: center; }
    .dep-title { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .status-dot {
      width: 34px; height: 34px; border-radius: 10px;
      display: grid; place-items: center; flex: 0 0 auto;
      background: #f0f1f7; color: #69738d; font-weight: 950;
      font-size: 13px;
    }
    .ok .status-dot { background: var(--green-soft); color: var(--green); }
    .missing .status-dot { background: var(--red-soft); color: var(--red); }
    .warn .status-dot { background: var(--amber-soft); color: var(--amber); }
    .checking .status-dot { background: var(--blue-soft); color: var(--blue); }
    .dep-name { font-size: 14px; font-weight: 900; color: #18233e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dep-type { margin-top: 2px; color: #8b95ad; font-size: 12px; font-weight: 750; }
    .dep-chevron { color: #9aa3ba; font-size: 20px; font-weight: 700; line-height: 1; }
    .dep-desc { margin: 12px 0 0 57px; color: #6f7a96; font-size: 13px; line-height: 1.55; font-weight: 650; }
    .dep-footer { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 14px; }
    .dep-tags { display: flex; flex-wrap: wrap; gap: 6px; min-width: 0; margin-left: 57px; }
    .mini-tag { height: 24px; display: inline-flex; align-items: center; padding: 0 8px; border-radius: 999px; background: #f2f3fa; color: #69738d; font-size: 11px; font-weight: 850; }
    .mini-tag.required { background: #f5f1ff; color: #6257dc; }
    .mini-tag.optional { background: #f2f5fa; color: #687286; }
    .config-panel {
      margin: 16px 0 0;
      padding-top: 16px;
      border-top: 1px solid #eef0f8;
      display: grid;
      gap: 12px;
    }
    .config-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .config-grid.single { grid-template-columns: 1fr; }
    .field-control { display: grid; gap: 6px; }
    .field-control.wide { grid-column: 1 / -1; }
    .config-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .ready-btn:disabled {
      opacity: 1;
      background: #edf0f7;
      color: #8791aa;
      box-shadow: none;
    }
    .config-note { color: #7b86a2; font-size: 12px; line-height: 1.55; font-weight: 650; }
    .saved-row {
      margin: 16px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fafaff;
      border: 1px solid #edf0fa;
      color: #69738d;
      font-size: 12px;
      font-weight: 750;
    }
    .saved-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

    .side-panel {
      position: sticky;
      top: 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .config-detail, .guide-card, .launch-card {
      padding: 16px;
      border-radius: 12px;
      background: #fbfbff;
      border: 1px solid #e8e9f7;
      box-shadow: 0 8px 20px rgba(40,48,90,.04);
    }
    .detail-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .detail-title h3, .guide-card h3, .launch-card h3 { margin: 0; font-size: 16px; letter-spacing: 0; }
    .detail-title p, .guide-card p, .launch-card p { margin: 8px 0 0; color: #77829d; font-size: 13px; line-height: 1.6; font-weight: 650; }
    .detail-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }
    .detail-help {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid #edf0fa;
      color: #66718d;
      font-size: 13px;
      line-height: 1.6;
      font-weight: 650;
    }
    .next-actions { display: flex; flex-direction: column; gap: 9px; margin-top: 15px; }
    .readiness-list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    .readiness-item { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: #55617e; font-weight: 700; line-height: 1.45; }
    .readiness-item .small-status { flex: 0 0 auto; margin-top: 2px; }
    .small-status { width: 18px; height: 18px; border-radius: 6px; display: grid; place-items: center; font-size: 11px; font-weight: 950; background: #edf0f8; color: #7a849b; }
    .small-status.ok { background: var(--green-soft); color: var(--green); }
    .small-status.warn { background: var(--amber-soft); color: #a16b00; }
    .small-status.missing { background: var(--red-soft); color: var(--red); }

    .checking-view {
      max-width: 860px;
      margin: 0 auto;
      padding: 10px 0 30px;
    }
    .checking-hero {
      padding: 18px;
      border-radius: 12px;
      background: #fbfbff;
      border: 1px solid #e8e9f7;
    }
    .checking-hero h2 { margin: 0; font-size: 19px; }
    .checking-hero p { margin: 8px 0 0; color: #76819e; line-height: 1.65; font-weight: 650; }
    .progress-bar {
      width: 100%; height: 10px; border-radius: 999px; background: #eceef8; overflow: hidden; margin-top: 18px;
    }
    .progress-fill { height: 100%; width: var(--progress, 0%); border-radius: inherit; background: var(--purple); transition: width .35s ease; }
    .checking-list { margin-top: 18px; display: grid; gap: 10px; }
    .check-row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 13px 14px; border-radius: 12px; background: #fff; border: 1px solid #eceef8;
    }
    .check-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .spinner {
      width: 18px; height: 18px; border: 3px solid #d8dcf0; border-top-color: var(--purple); border-radius: 999px;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results-layout {
      display: grid; grid-template-columns: 330px minmax(0, 1fr); gap: 18px; align-items: start;
    }
    .run-status-card {
      padding: 16px; border-radius: 12px; background: #f3fbf7; border: 1px solid #d8f1e5;
    }
    .run-status-card h2 { margin: 0; font-size: 19px; color: #0f6e49; }
    .run-status-card p { margin: 9px 0 0; color: #55736a; line-height: 1.62; font-weight: 650; font-size: 13px; }
    .recent-card, .candidate-card {
      padding: 16px; border-radius: 12px; background: #fff; border: 1px solid #e5e6f7; box-shadow: 0 8px 20px rgba(30,40,80,.04);
    }
    .recent-card h3, .candidate-card h3 { margin: 0; }
    .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
    .stat-box { padding: 12px; border-radius: 14px; background: #f8f9ff; }
    .stat-box b { display: block; font-size: 22px; }
    .stat-box span { display: block; margin-top: 3px; color: #7c87a2; font-size: 12px; font-weight: 750; }
    .candidate-list { display: grid; gap: 12px; }
    .candidate-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .candidate-meta { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 7px; }
    .candidate-reason { display: none; margin-top: 13px; padding: 13px; border-radius: 14px; background: #f8f9ff; color: #5d6884; line-height: 1.6; font-size: 13px; font-weight: 650; }
    .candidate-card.open .candidate-reason { display: block; }

    .sticky-launch {
      position: absolute;
      right: 26px;
      bottom: 24px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.96);
      border: 1px solid #e8e9f7;
      box-shadow: 0 14px 34px rgba(48,54,92,.12);
      backdrop-filter: blur(10px);
    }
    .sticky-launch .secondary-btn {
      min-height: 42px;
      padding: 0 18px;
      background: #f5f6fb;
    }
    .sticky-launch .green-btn, .sticky-launch .launch-disabled {
      min-height: 42px;
      min-width: 92px;
      padding: 0 22px;
    }
    .launch-disabled:disabled {
      opacity: 1;
      background: #eef0f6;
      color: #8a94aa;
      box-shadow: none;
    }

    .drawer-backdrop {
      position: fixed; inset: 0; background: rgba(23, 34, 59, .18);
      z-index: 40;
      display: none;
      backdrop-filter: blur(2px);
    }
    .drawer-backdrop.show { display: block; }
    .drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(480px, 94vw);
      background: #fff;
      z-index: 50;
      box-shadow: -24px 0 60px rgba(23,34,59,.18);
      transform: translateX(105%);
      transition: transform .22s ease;
      display: flex;
      flex-direction: column;
    }
    .drawer.show { transform: translateX(0); }
    .drawer-head {
      padding: 22px 22px 16px;
      border-bottom: 1px solid #eceef9;
      display: flex; justify-content: space-between; gap: 12px; align-items: flex-start;
    }
    .drawer-head h2 { margin: 0; font-size: 20px; }
    .drawer-head p { margin: 8px 0 0; color: #7a86a4; line-height: 1.55; font-size: 13px; font-weight: 650; }
    .close-btn { width: 34px; height: 34px; border-radius: 12px; background: #f2f3fb; color: #53607e; font-size: 20px; }
    .drawer-body { padding: 20px 22px 110px; overflow: auto; }
    .drawer-section { margin-bottom: 18px; }
    .drawer-section h3 { margin: 0 0 10px; font-size: 14px; color: #2e3a58; }
    .guide-steps { display: grid; gap: 10px; }
    .guide-step {
      display: grid; grid-template-columns: 28px 1fr; gap: 10px;
      padding: 12px; border-radius: 14px; background: #fbfbff; border: 1px solid #eceef9;
    }
    .guide-step-num { width: 28px; height: 28px; border-radius: 10px; background: var(--purple-soft); color: var(--purple); display: grid; place-items: center; font-weight: 950; }
    .guide-step-title { font-weight: 900; }
    .guide-step-desc { margin-top: 4px; color: #7a86a4; line-height: 1.55; font-size: 13px; font-weight: 650; }
    .input-row { display: grid; gap: 8px; margin-top: 12px; }
    .input-label { color: #67728d; font-size: 12px; font-weight: 900; }
    .text-input {
      width: 100%; min-height: 42px; border-radius: 12px; border: 1px solid #e4e7f5; background: #fbfcff;
      padding: 0 12px; color: #24304d; outline: none; font-weight: 700;
    }
    .text-input:focus { border-color: #9b92ff; box-shadow: 0 0 0 4px rgba(99,91,255,.1); }
    .drawer-actions {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 16px 22px 20px;
      background: linear-gradient(180deg, rgba(255,255,255,.84), #fff 35%);
      border-top: 1px solid #eceef9;
      display: flex; justify-content: flex-end; gap: 10px;
    }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(23,34,59,.24);
      display: none; place-items: center;
      z-index: 60;
      backdrop-filter: blur(3px);
    }
    .modal-backdrop.show { display: grid; }
    .launch-modal {
      width: min(520px, 92vw);
      padding: 24px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 26px 80px rgba(23,34,59,.26);
    }
    .launch-modal h2 { margin: 0; font-size: 21px; }
    .launch-modal p { margin: 9px 0 0; color: #72809c; line-height: 1.65; font-weight: 650; }
    .launch-steps { display: grid; gap: 10px; margin-top: 18px; }
    .launch-step { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 14px; background: #fbfbff; border: 1px solid #eceef9; color: #4d5873; font-weight: 800; }
    .launch-step.done .spinner { display: none; }
    .launch-step.done .small-status { display: grid; }
    .launch-step .small-status { display: none; }

    .toast {
      position: fixed;
      left: 50%; bottom: 26px;
      transform: translateX(-50%) translateY(20px);
      z-index: 80;
      padding: 12px 16px;
      border-radius: 999px;
      background: #1d263b;
      color: #fff;
      font-size: 13px; font-weight: 850;
      box-shadow: 0 16px 40px rgba(29,38,59,.22);
      opacity: 0; pointer-events: none;
      transition: .22s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .muted { color: var(--muted); }
    .hide { display: none !important; }

    @media (max-width: 1120px) {
      .dashboard-grid, .results-layout { grid-template-columns: 1fr; }
      .side-panel { position: static; }
      .dependency-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 880px) {
      :root { --sidebar: 78px; }
      .brand-name, .brand-badge, .side-collapse, .new-task span, .nav-item span:not(.nav-icon), .nav-divider, .side-bottom .nav-icon { display: none; }
      .brand-row { justify-content: center; padding: 0; }
      .new-task { width: 48px; margin: 4px auto; }
      .nav-item { justify-content: center; padding: 0; }
      .workspace { min-width: 0; padding: 14px 8px 0 0; }
      .content-card { height: calc(100vh - 14px); }
      .header-top { display: block; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Domi 左侧导航">
      <div class="traffic"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
      <div class="brand-row">
        <div class="brand-mark" aria-hidden="true"></div>
        <div class="brand-name">Domi</div>
        <div class="brand-badge">猎头</div>
      </div>
      <button class="side-collapse" title="折叠侧边栏">◫</button>
      <button class="new-task"><span aria-hidden="true">⊞</span><span>布置新任务</span></button>
      <nav class="nav-list">
        <div class="nav-item"><span class="nav-icon">▣</span><span>整理简历</span></div>
        <div class="nav-item"><span class="nav-icon">✣</span><span>技能商城</span></div>
        <div class="nav-item"><span class="nav-icon">▱</span><span>文件管理</span></div>
        <div class="nav-item"><span class="nav-icon">▦</span><span>报告模板</span></div>
        <div class="nav-item seek active"><span class="nav-icon">◎</span><span>找候选人</span></div>
        <div class="nav-divider"></div>
        <div class="nav-item"><span class="nav-icon">↺</span><span>历史任务</span></div>
      </nav>
      <div class="sidebar-spacer"></div>
      <div class="side-bottom"><div class="avatar">F</div><div class="nav-icon">♚</div></div>
    </aside>

    <main class="workspace">
      <section class="content-card" aria-label="SeekTalent 子应用">
        <header class="main-header">
          <div class="header-top">
            <div class="title-group">
              <h1>SeekTalent 启动中心</h1>
              <p>在 Domi 内完成本地配置，检测通过后启动人才搜索工作台。</p>
            </div>
          </div>
        </header>
        <div class="tabbar" role="tablist" aria-label="SeekTalent 页面切换">
          <button class="tab-btn active" data-tab="dashboard">启动配置</button>
          <button class="tab-btn" data-tab="results">最近结果</button>
        </div>
        <div class="main-body" id="mainBody"></div>
        <div class="sticky-launch" id="stickyLaunch"></div>
      </section>
    </main>
  </div>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="guideDrawer" aria-label="本地配置抽屉">
    <div class="drawer-head">
      <div>
        <h2 id="drawerTitle">本地配置</h2>
        <p id="drawerDesc"></p>
      </div>
      <button class="close-btn" id="closeDrawer" aria-label="关闭">×</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-actions">
      <button class="secondary-btn" id="drawerRetest">重新检测</button>
      <button class="green-btn" id="drawerMarkDone">我已完成</button>
    </div>
  </aside>

  <div class="modal-backdrop" id="launchModal">
    <div class="launch-modal">
      <h2 id="launchTitle">正在启动 SeekTalent…</h2>
      <p id="launchDesc">第一次启动可能需要等待本地服务准备完成。这里用原型动画模拟启动过程。</p>
      <div class="launch-steps" id="launchSteps"></div>
    </div>
  </div>

  <div class="toast" id="toast">已复制</div>

  <script>
    const depsTemplate = [
      {
        id: 'localService',
        name: '本地运行服务',
        type: '必需',
        required: true,
        desc: '负责在你的电脑上运行 SeekTalent。',
        tags: ['本机运行', '工作台', '必需'],
        why: '没有本地运行服务，页面无法进入 SeekTalent 工作台。',
        steps: [
          ['确认项目路径', '选择 SeekTalent 项目目录，确保工作台从正确目录启动。'],
          ['启动本地运行服务', '让应用在你的电脑上运行 SeekTalent。'],
          ['回到这里重新检测', '检测通过后，该项会变成绿色。']
        ],
        fields: []
      },
      {
        id: 'opencli',
        name: '浏览器连接助手',
        type: '数据源',
        required: false,
        desc: '用于读取你已登录浏览器中的猎聘页面。',
        tags: ['浏览器', '猎聘', '本机'],
        why: '猎聘数据源需要浏览器连接助手读取已登录浏览器中的页面。',
        steps: [
          ['启动浏览器连接助手', '确认助手可在本机运行，并能与 Chrome 建立连接。'],
          ['打开 Chrome', '在 Chrome 中登录猎聘，保持浏览器窗口可用。'],
          ['回到这里重新检测', '检测通过后，猎聘数据源会变为可用。']
        ],
        fields: []
      },
      {
        id: 'liepinLogin',
        name: '猎聘登录状态',
        type: '数据源',
        required: false,
        desc: '确认当前 Chrome 是否已登录猎聘。',
        tags: ['猎聘', '登录状态'],
        why: 'SeekTalent 只能读取你已经登录并授权访问的猎聘页面。',
        steps: [
          ['打开猎聘', '在 Chrome 中打开猎聘并完成登录。'],
          ['保持登录页可访问', '不要关闭 Chrome，也不要切换到无痕环境。'],
          ['重新检测', '通过后，猎聘候选人检索会变为可用。']
        ],
        fields: []
      },
      {
        id: 'localResumeLibrary',
        name: '本地简历库状态',
        type: '数据源',
        required: false,
        desc: '确认本机简历库是否可用于候选人检索。',
        tags: ['本地简历', '索引状态'],
        why: '本地简历库可用后，SeekTalent 可以把本机已有简历纳入候选人检索范围。',
        steps: [
          ['确认简历库位置', '选择或确认本机简历库目录。'],
          ['检查索引状态', '确认本地索引可读取，必要时触发增量更新。'],
          ['重新检测', '通过后，本地简历库会参与候选人检索。']
        ],
        fields: []
      }
    ];

    const scenarios = {
      fresh: {
        label: '首次使用', checked: false, launched: false,
        statuses: { localService:'unknown', opencli:'unknown', liepinLogin:'unknown', localResumeLibrary:'unknown' }
      },
      partial: {
        label: '部分就绪', checked: true, launched: false,
        statuses: { localService:'ok', opencli:'missing', liepinLogin:'warn', localResumeLibrary:'warn' }
      },
      ready: {
        label: '全部就绪', checked: true, launched: false,
        statuses: { localService:'ok', opencli:'ok', liepinLogin:'ok', localResumeLibrary:'ok' }
      },
      running: {
        label: '已运行', checked: true, launched: true,
        statuses: { localService:'ok', opencli:'ok', liepinLogin:'ok', localResumeLibrary:'ok' }
      }
    };

    const state = {
      activeTab: 'dashboard',
      scenario: 'fresh',
      checked: false,
      checking: false,
      checkProgress: 0,
      deps: depsTemplate.map(d => ({...d, status: 'unknown'})),
      editingDeps: new Set(),
      selectedDepId: null,
      drawerId: null,
      launched: false,
      launchMode: 'full'
    };

    const statusMeta = {
      ok: { label: '已就绪', icon: '✓', cls: 'ok' },
      missing: { label: '未配置', icon: '!', cls: 'missing' },
      warn: { label: '需确认', icon: '!', cls: 'warn' },
      checking: { label: '检测中', icon: '…', cls: 'checking' },
      unknown: { label: '未检查', icon: '?', cls: 'unknown' }
    };

    const candidates = [
      { name: '候选人 A', source: '猎聘', title: '后端 / Agent 工程师', match: 'Strong Match', score: '92', reasons: ['5 年以上 Python / 后端服务经验', '做过检索、排序或自动化工作流', '最近项目与 JD 中的 Agent orchestration 高相关'] },
      { name: '候选人 B', source: '猎聘', title: 'AI 应用工程师', match: 'Maybe', score: '81', reasons: ['有 LLM 应用落地经验', '简历中出现浏览器自动化和数据管道关键词', '管理经验不足，需要人工复核'] },
      { name: '候选人 C', source: '猎聘', title: '数据平台工程师', match: 'Review', score: '74', reasons: ['数据处理能力强', '业务领域与招聘 JD 有部分重合', 'Agent 经验证据较弱，建议打开本地快照查看'] }
    ];

    const $ = sel => document.querySelector(sel);
    const $$ = sel => Array.from(document.querySelectorAll(sel));

    function cloneDepsWithStatuses(statuses) {
      return depsTemplate.map(d => ({...d, status: statuses[d.id] || 'unknown'}));
    }

    function applyScenario(name) {
      const s = scenarios[name];
      state.scenario = name;
      state.checked = s.checked;
      state.checking = false;
      state.checkProgress = 0;
      state.launched = s.launched;
      state.deps = cloneDepsWithStatuses(s.statuses);
      state.editingDeps = new Set();
      state.selectedDepId = getDefaultDepId();
      state.launchMode = 'full';
      if (name === 'running') state.activeTab = 'results';
      render();
    }

    function dep(id) { return state.deps.find(d => d.id === id); }
    function setDepStatus(id, status) { const d = dep(id); if (d) d.status = status; }
    function getDefaultDepId() {
      const required = state.deps.find(d => d.required && d.status !== 'ok');
      const pending = state.deps.find(d => d.status !== 'ok');
      return (required || pending || state.deps[0])?.id || null;
    }
    function getSelectedDep() {
      if (!dep(state.selectedDepId)) state.selectedDepId = getDefaultDepId();
      return dep(state.selectedDepId);
    }

    function getReadiness() {
      const required = state.deps.filter(d => d.required);
      const browserReady = dep('opencli')?.status === 'ok' && dep('liepinLogin')?.status === 'ok';
      const resumeLibraryReady = dep('localResumeLibrary')?.status === 'ok';
      const missing = state.deps.filter(d => d.status === 'missing').length;
      const warn = state.deps.filter(d => d.status === 'warn').length;
      const unknown = state.deps.filter(d => d.status === 'unknown').length;
      const allRequiredOk = required.every(d => d.status === 'ok');
      const canLaunchFull = allRequiredOk && browserReady && resumeLibraryReady;
      return { missing, warn, unknown, canLaunchFull };
    }

    function render() {
      renderTabs();
      renderMain();
      renderStickyLaunch();
    }

    function renderTabs() {
      $$('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === state.activeTab));
    }

    function renderMain() {
      const body = $('#mainBody');
      if (state.activeTab === 'results') body.innerHTML = renderResults();
      else body.innerHTML = renderDashboard();
      bindDynamicEvents();
    }

    function renderDashboard() {
      if (state.checking) return renderChecking();
      const selected = getSelectedDep();
      return `
        <div class="dashboard-grid">
          <section aria-label="配置项列表">
            <div class="dependency-grid">
              ${state.deps.map(renderDepCard).join('')}
            </div>
          </section>
          <aside class="side-panel">
            ${renderDependencyDetail(selected)}
          </aside>
        </div>
      `;
    }

    function renderChecking() {
      return `
        <div class="checking-view">
          <div class="checking-hero">
            <h2>正在检查本地环境…</h2>
            <p>这里模拟逐项检测：本地运行服务、浏览器连接助手、猎聘登录状态和本地简历库状态。</p>
            <div class="progress-bar"><div class="progress-fill" style="--progress:${state.checkProgress}%"></div></div>
          </div>
          <div class="checking-list">
            ${state.deps.map(d => {
              const meta = statusMeta[d.status] || statusMeta.unknown;
              const indicator = d.status === 'checking' ? '<div class="spinner"></div>' : `<span class="small-status ${meta.cls}">${meta.icon}</span>`;
              return `<div class="check-row"><div class="check-left">${indicator}<strong>${d.name}</strong></div><span class="chip ${meta.cls}">${meta.label}</span></div>`;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderDepCard(d) {
      const meta = statusMeta[d.status] || statusMeta.unknown;
      const selected = state.selectedDepId === d.id;
      return `
        <article class="dep-card ${meta.cls} ${selected ? 'selected' : ''}" data-action="select-dep" data-id="${d.id}" data-dep-id="${d.id}" role="button" tabindex="0" aria-current="${selected ? 'true' : 'false'}">
          <div class="dep-head">
            <div class="dep-title">
              <div class="status-dot">${meta.icon}</div>
              <div><div class="dep-name">${d.name}</div><div class="dep-type">${d.type} · ${meta.label}</div></div>
            </div>
            <div class="dep-chevron">›</div>
          </div>
        </article>
      `;
    }

    function renderDependencyDetail(d) {
      if (!d) return '';
      const meta = statusMeta[d.status] || statusMeta.unknown;
      const editing = state.editingDeps.has(d.id);
      return `
        <section class="config-detail ${meta.cls}" aria-label="${d.name} 配置详情">
          <div class="detail-head">
            <div class="detail-title">
              <h3>${d.name}</h3>
              <p>${d.desc}</p>
            </div>
            <span class="chip ${meta.cls}">${meta.label}</span>
          </div>
          <div class="detail-tags">
            <span class="mini-tag ${d.required ? 'required' : 'optional'}">${d.required ? '启动必需' : '数据源相关'}</span>
            ${d.tags.map(t => `<span class="mini-tag">${t}</span>`).join('')}
          </div>
          <div class="detail-help">${d.why}</div>
          ${renderDirectConfig(d, editing)}
        </section>
      `;
    }

    function renderDirectConfig(d, editing) {
      if (d.status === 'ok' && !editing) {
        const retestAction = retestActionFor(d);
        const idAttr = retestIdAttr(d, retestAction);
        if (!d.fields.length) {
          return `
            <div class="config-panel">
              <div class="config-actions">
                <button class="secondary-btn ready-btn" disabled>${readyActionLabel(d)}</button>
                <button class="primary-btn" data-action="${retestAction}"${idAttr}>重新检测</button>
              </div>
              <div class="config-note">${readyNote(d)}</div>
            </div>
          `;
        }
        return `
          <div class="saved-row">
            <span>已就绪，可随时编辑或重新检测。</span>
            <div class="saved-actions">
              ${d.fields.length ? `<button class="tiny-btn" data-action="edit-config" data-id="${d.id}">编辑配置</button>` : ''}
              <button class="tiny-btn" data-action="${retestAction}"${idAttr}>重新检测</button>
            </div>
          </div>
        `;
      }
      if (d.fields.length) {
        return `
          <div class="config-panel">
            <div class="config-grid ${d.fields.length === 1 ? 'single' : ''}">
              ${d.fields.map(field => renderConfigField(field)).join('')}
            </div>
            <div class="config-actions">
              <button class="primary-btn" data-action="save-config" data-id="${d.id}">保存并测试</button>
            </div>
            <div class="config-note">配置会保存到本机，只把安全状态返回给 Domi。</div>
          </div>
        `;
      }
      if (d.id === 'localService') {
        return `
          <div class="config-panel">
            <div class="config-actions">
              <button class="primary-btn" data-action="install-local-service">安装本地运行服务</button>
              <button class="secondary-btn" data-action="single-check" data-id="${d.id}">重新检测</button>
            </div>
            <div class="config-note">安装完成后，Domi 会通过本机接口启动 SeekTalent。</div>
          </div>
        `;
      }
      if (d.id === 'opencli') {
        return `
          <div class="config-panel">
            <div class="config-actions">
              <button class="primary-btn" data-action="check-browser-helper">检测连接状态</button>
              <button class="secondary-btn" data-action="open-plugin-install">安装指引</button>
            </div>
            <div class="config-note">浏览器插件需要手动安装。安装后，浏览器连接助手会把安全状态回传给本地服务。</div>
          </div>
        `;
      }
      if (d.id === 'liepinLogin') {
        return `
          <div class="config-panel">
            <div class="config-actions">
              <button class="primary-btn" data-action="check-liepin-login">检测登录状态</button>
            </div>
            <div class="config-note">只检测登录状态，不读取 cookie、简历原文或页面敏感内容。</div>
          </div>
        `;
      }
      if (d.id === 'localResumeLibrary') {
        return `
          <div class="config-panel">
            <div class="config-actions">
              <button class="primary-btn" data-action="check-local-resume-library">检测本地简历库状态</button>
            </div>
            <div class="config-note">只检测本地简历库可用性和索引状态，不上传或展示简历原文。</div>
          </div>
        `;
      }
      return '';
    }

    function retestActionFor(d) {
      return {
        localService: 'single-check',
        opencli: 'check-browser-helper',
        liepinLogin: 'check-liepin-login',
        localResumeLibrary: 'check-local-resume-library'
      }[d.id] || 'save-config';
    }

    function retestIdAttr(d, action) {
      return action === 'save-config' || action === 'single-check' ? ` data-id="${d.id}"` : '';
    }

    function readyActionLabel(d) {
      return {
        localService: '本地服务已就绪',
        opencli: '浏览器连接已就绪',
        liepinLogin: '猎聘登录已确认',
        localResumeLibrary: '本地简历库已确认'
      }[d.id] || '已就绪';
    }

    function readyNote(d) {
      return {
        localService: '本地运行服务已可用，Domi 可以通过本机接口启动 SeekTalent。',
        opencli: '浏览器连接助手已可用，可以继续确认猎聘登录状态。',
        liepinLogin: '当前 Chrome 的猎聘登录状态已确认。',
        localResumeLibrary: '本地简历库状态已确认，可以纳入候选人检索范围。'
      }[d.id] || '当前配置已通过检测。';
    }

    function renderConfigField(field) {
      return `
        <label class="field-control ${field.wide ? 'wide' : ''}">
          <span class="input-label">${field.label}</span>
          <input class="text-input" type="${field.secret ? 'password' : 'text'}" placeholder="${field.placeholder}" />
        </label>
      `;
    }

    function renderResults() {
      const r = getReadiness();
      if (!state.launched) {
        return `
          <div class="welcome">
            <div class="welcome-inner">
              <div class="illustration" aria-hidden="true"><div class="illu-base"></div><div class="illu-doc"></div><div class="illu-folder"></div><div class="illu-search"></div></div>
              <h2>还没有运行结果</h2>
              <p>启动 SeekTalent 后，这里会展示最近任务、候选人短名单摘要和本地结果文件夹入口。</p>
              <div class="welcome-actions">
                ${r.canLaunchFull ? '<button class="green-btn" data-action="launch" data-mode="full">启动 SeekTalent</button>' : '<button class="primary-btn" data-tab-jump="dashboard">返回启动配置</button>'}
                <button class="secondary-btn" data-scenario="running">查看运行后示例</button>
              </div>
            </div>
          </div>
        `;
      }
      const modeCopy = '猎聘和本地简历库已可用，当前为完整模式。';
      return `
        <div class="results-layout">
          <aside class="side-panel">
            <div class="run-status-card">
              <h2>SeekTalent 正在运行</h2>
              <p>${modeCopy}</p>
              <div class="next-actions">
                <button class="green-btn" data-action="open-workbench">进入工作台</button>
                <button class="secondary-btn" data-action="open-folder">打开本地结果文件夹</button>
              </div>
            </div>
            <div class="recent-card">
              <h3>最近一次任务</h3>
              <p class="muted" style="line-height:1.6;font-weight:650">后端 Agent 工程师 · 上海 / 远程 · 最近更新 12 分钟前</p>
              <div class="stat-row">
                <div class="stat-box"><b>18</b><span>候选人</span></div>
                <div class="stat-box"><b>5</b><span>Strong</span></div>
                <div class="stat-box"><b>4</b><span>需复核</span></div>
              </div>
            </div>
          </aside>
          <section>
            <div class="candidate-list">
              ${candidates.map((c, i) => renderCandidate(c, i)).join('')}
            </div>
          </section>
        </div>
      `;
    }

    function renderCandidate(c, i) {
      return `
        <article class="candidate-card" data-candidate="${i}">
          <div class="candidate-top">
            <div>
              <h3>${c.name}</h3>
              <p class="muted" style="margin:7px 0 0;font-weight:700">${c.title}</p>
              <div class="candidate-meta">
                <span class="chip purple">${c.source}</span>
                <span class="chip ${c.match === 'Strong Match' ? 'green' : c.match === 'Maybe' ? 'amber' : ''}">${c.match}</span>
                <span class="chip">匹配分 ${c.score}</span>
              </div>
            </div>
            <button class="tiny-btn" data-action="toggle-candidate" data-candidate="${i}">查看理由</button>
          </div>
          <div class="candidate-reason">
            <strong>为什么推荐：</strong>
            <ul>${c.reasons.map(r => `<li>${r}</li>`).join('')}</ul>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
              <button class="tiny-btn" data-action="open-folder">打开本地结果文件</button>
              <button class="tiny-btn" data-action="toast" data-message="原型：这里会打开安全快照，而不是直接暴露原始简历。">查看安全快照</button>
            </div>
          </div>
        </article>
      `;
    }

    function renderStickyLaunch() {
      const r = getReadiness();
      const checkLabel = state.checking ? '检测中…' : state.checked ? '重新检测' : '检测当前配置';
      const checkButton = `<button class="secondary-btn" data-action="start-check" ${state.checking ? 'disabled' : ''}>${checkLabel}</button>`;
      const launchButton = state.launched
        ? `<button class="green-btn" data-tab-jump="results">查看结果</button>`
        : r.canLaunchFull
          ? `<button class="green-btn" data-action="launch" data-mode="full">启动</button>`
          : `<button class="launch-disabled" disabled>启动</button>`;
      $('#stickyLaunch').innerHTML = `${checkButton}${launchButton}`;
      bindDynamicEvents($('#stickyLaunch'));
    }

    function bindDynamicEvents(scope = document) {
      scope.querySelectorAll('[data-tab-jump]').forEach(el => el.onclick = () => { state.activeTab = el.dataset.tabJump; render(); });
      scope.querySelectorAll('[data-action="start-check"]').forEach(el => el.onclick = runCheck);
      scope.querySelectorAll('[data-action="open-guide"]').forEach(el => el.onclick = () => openGuide(el.dataset.id));
      scope.querySelectorAll('[data-action="select-dep"]').forEach(el => {
        el.onclick = () => selectDep(el.dataset.id);
        el.onkeydown = event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            selectDep(el.dataset.id);
          }
        };
      });
      scope.querySelectorAll('[data-action="single-check"]').forEach(el => el.onclick = () => singleCheck(el.dataset.id));
      scope.querySelectorAll('[data-action="save-config"]').forEach(el => el.onclick = () => saveConfig(el.dataset.id));
      scope.querySelectorAll('[data-action="edit-config"]').forEach(el => el.onclick = () => editConfig(el.dataset.id));
      scope.querySelectorAll('[data-action="focus-dep"]').forEach(el => el.onclick = () => focusDep(el.dataset.id));
      scope.querySelectorAll('[data-action="install-local-service"]').forEach(el => el.onclick = installLocalService);
      scope.querySelectorAll('[data-action="check-browser-helper"]').forEach(el => el.onclick = checkBrowserHelper);
      scope.querySelectorAll('[data-action="open-plugin-install"]').forEach(el => el.onclick = openPluginInstall);
      scope.querySelectorAll('[data-action="check-liepin-login"]').forEach(el => el.onclick = checkLiepinLogin);
      scope.querySelectorAll('[data-action="check-local-resume-library"]').forEach(el => el.onclick = checkLocalResumeLibrary);
      scope.querySelectorAll('[data-action="launch"]').forEach(el => el.onclick = () => launchSeekTalent(el.dataset.mode || 'full'));
      scope.querySelectorAll('[data-action="open-folder"]').forEach(el => el.onclick = () => toast('原型：这里会打开本地结果文件夹。'));
      scope.querySelectorAll('[data-action="open-workbench"]').forEach(el => el.onclick = () => toast('原型：这里会进入真实 SeekTalent 工作台。'));
      scope.querySelectorAll('[data-action="toast"]').forEach(el => el.onclick = () => toast(el.dataset.message || '已完成'));
      scope.querySelectorAll('[data-action="toggle-candidate"]').forEach(el => el.onclick = () => toggleCandidate(el.dataset.candidate));
      scope.querySelectorAll('[data-scenario]').forEach(el => el.onclick = () => applyScenario(el.dataset.scenario));
      $$('.scenario-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.scenario === state.scenario));
    }

    function selectDep(id) {
      if (!id || !dep(id)) return;
      state.selectedDepId = id;
      render();
    }

    async function runCheck() {
      const previousStatuses = Object.fromEntries(state.deps.map(d => [d.id, d.status]));
      const previousSelected = state.selectedDepId;
      state.activeTab = 'dashboard';
      state.checked = true;
      state.checking = true;
      state.checkProgress = 0;
      state.launched = false;
      state.deps = depsTemplate.map(d => ({...d, status: 'unknown'}));
      state.editingDeps = new Set();
      render();
      const target = {...scenarios.partial.statuses};
      Object.entries(previousStatuses).forEach(([id, status]) => {
        if (status === 'ok') target[id] = 'ok';
      });
      for (let i = 0; i < state.deps.length; i++) {
        state.deps[i].status = 'checking';
        state.checkProgress = Math.round((i / state.deps.length) * 88);
        render();
        await sleep(520);
        state.deps[i].status = target[state.deps[i].id];
        state.checkProgress = Math.round(((i + 1) / state.deps.length) * 100);
        render();
        await sleep(180);
      }
      state.checking = false;
      state.scenario = 'custom';
      if (!previousSelected || dep(previousSelected)?.status === 'ok') state.selectedDepId = getDefaultDepId();
      render();
      const readiness = getReadiness();
      const pending = readiness.missing + readiness.warn + readiness.unknown;
      toast(pending ? `检测完成：还有 ${pending} 项需要处理。` : '检测完成：全部就绪。');
    }

    async function singleCheck(id) {
      setDepStatus(id, 'checking');
      state.checked = true;
      render();
      await sleep(600);
      const target = scenarios.partial.statuses[id] || 'ok';
      setDepStatus(id, target);
      render();
      toast(`${dep(id).name}：${statusMeta[target].label}`);
    }

    async function saveConfig(id, options = {}) {
      const d = dep(id);
      if (!d) return;
      setDepStatus(id, 'checking');
      state.checked = true;
      render();
      await sleep(650);
      setDepStatus(id, 'ok');
      state.editingDeps.delete(id);
      state.scenario = 'custom';
      render();
      if (!options.silent) toast(`${d.name} 已保存并通过测试。`);
    }

    function editConfig(id) {
      if (!id) return;
      state.selectedDepId = id;
      state.editingDeps.add(id);
      render();
    }

    function focusDep(id, options = {}) {
      if (!id) return;
      state.activeTab = 'dashboard';
      state.selectedDepId = id;
      state.editingDeps.add(id);
      render();
      const card = document.querySelector(`[data-dep-id="${id}"]`);
      card?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      if (!options.silent) toast('已定位到配置项。');
    }

    async function installLocalService() {
      setDepStatus('localService', 'checking');
      state.checked = true;
      render();
      await sleep(700);
      setDepStatus('localService', 'ok');
      state.scenario = 'custom';
      render();
      toast('本地运行服务已安装。');
    }

    async function checkBrowserHelper() {
      setDepStatus('opencli', 'checking');
      state.checked = true;
      render();
      await sleep(700);
      setDepStatus('opencli', 'ok');
      state.scenario = 'custom';
      render();
      toast('浏览器连接助手已连接。');
    }

    function openPluginInstall() {
      toast('原型：这里会打开浏览器插件安装指引。');
    }

    async function checkLiepinLogin() {
      setDepStatus('liepinLogin', 'checking');
      state.checked = true;
      render();
      await sleep(700);
      setDepStatus('liepinLogin', 'ok');
      state.scenario = 'custom';
      render();
      toast('猎聘登录状态已确认。');
    }

    async function checkLocalResumeLibrary() {
      setDepStatus('localResumeLibrary', 'checking');
      state.checked = true;
      render();
      await sleep(700);
      setDepStatus('localResumeLibrary', 'ok');
      state.scenario = 'custom';
      render();
      toast('本地简历库状态已确认。');
    }

    function openGuide(id) {
      const d = dep(id);
      if (!d) return;
      state.drawerId = id;
      $('#drawerTitle').textContent = d.name;
      $('#drawerDesc').textContent = d.why;
      $('#drawerBody').innerHTML = `
        <div class="drawer-section">
          <h3>配置步骤</h3>
          <div class="guide-steps">
            ${d.steps.map((s, i) => `
              <div class="guide-step">
                <div class="guide-step-num">${i + 1}</div>
                <div><div class="guide-step-title">${s[0]}</div><div class="guide-step-desc">${s[1]}</div></div>
              </div>`).join('')}
          </div>
        </div>
        ${d.fields.length ? `<div class="drawer-section"><h3>本地配置示例</h3>${d.fields.map(f => `<div class="input-row"><label class="input-label">${f.label}</label><input class="text-input" placeholder="${f.placeholder}" /></div>`).join('')}<p class="muted" style="line-height:1.6;font-size:12px;font-weight:650;margin-top:10px">原型提示：这些字段用于展示交互，需要替换成 SeekTalent 项目里的真实配置项。</p></div>` : ''}
      `;
      $('#drawerBackdrop').classList.add('show');
      $('#guideDrawer').classList.add('show');
    }

    function closeGuide() {
      $('#drawerBackdrop').classList.remove('show');
      $('#guideDrawer').classList.remove('show');
      state.drawerId = null;
    }

    async function drawerRetest() {
      const id = state.drawerId;
      if (!id) return;
      closeGuide();
      await singleCheck(id);
    }

    function drawerMarkDone() {
      const id = state.drawerId;
      if (!id) return;
      setDepStatus(id, 'ok');
      state.checked = true;
      state.scenario = 'custom';
      closeGuide();
      render();
      toast(`${dep(id).name} 已标记为就绪。`);
    }

    async function launchSeekTalent(mode) {
      state.launchMode = mode;
      const steps = ['启动本地运行服务', '加载工作台', '检查浏览器连接助手和猎聘', '加载本地简历库'];
      $('#launchTitle').textContent = '正在启动 SeekTalent…';
      $('#launchDesc').textContent = '本地运行服务准备完成后，会进入 SeekTalent 工作台。';
      $('#launchSteps').innerHTML = steps.map(s => `<div class="launch-step"><div class="spinner"></div><span class="small-status ok">✓</span><span>${s}</span></div>`).join('');
      $('#launchModal').classList.add('show');
      const rows = $$('.launch-step');
      for (const row of rows) {
        await sleep(620);
        row.classList.add('done');
      }
      await sleep(420);
      $('#launchModal').classList.remove('show');
      state.launched = true;
      state.activeTab = 'results';
      state.deps.forEach(d => d.status = 'ok');
      state.scenario = 'running';
      render();
      toast('SeekTalent 已启动。');
    }

    function toggleCandidate(index) {
      const card = document.querySelector(`[data-candidate="${index}"]`);
      if (card) card.classList.toggle('open');
    }

    function toast(message) {
      const el = $('#toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.remove('show'), 2400);
    }

    function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }

    document.addEventListener('click', e => {
      if (e.target.matches('.tab-btn')) {
        state.activeTab = e.target.dataset.tab;
        render();
      }
    });
    $('#closeDrawer').addEventListener('click', closeGuide);
    $('#drawerBackdrop').addEventListener('click', closeGuide);
    $('#drawerRetest').addEventListener('click', drawerRetest);
    $('#drawerMarkDone').addEventListener('click', drawerMarkDone);

    applyScenario('fresh');
  </script>
</body>
</html>
