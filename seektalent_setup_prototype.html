
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeekTalent 启动中心 - 交互原型</title>
  <style>
    :root {
      --bg: #f3f2ff;
      --panel: #fefeff;
      --panel-2: #f8f8ff;
      --ink: #17213d;
      --muted: #7a86a5;
      --soft: #ebe9ff;
      --line: #e7e8f6;
      --purple: #675cff;
      --purple-2: #7d72ff;
      --purple-soft: #efedff;
      --navy: #17213d;
      --green: #23ad76;
      --green-soft: #e8f8f1;
      --amber: #d9901c;
      --amber-soft: #fff7e4;
      --red: #dc5260;
      --red-soft: #fff0f3;
      --blue: #4f7dff;
      --blue-soft: #eef4ff;
      --shadow: 0 18px 42px rgba(72, 77, 128, 0.08);
      --shadow-soft: 0 8px 20px rgba(47, 52, 94, 0.07);
      --radius-xl: 14px;
      --radius-lg: 12px;
      --radius-md: 10px;
      --radius-sm: 8px;
      --sidebar: 260px;
      --font: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font);
      overflow: hidden;
    }

    button, input, textarea { font: inherit; }
    button { cursor: pointer; border: 0; }
    button:disabled { cursor: not-allowed; opacity: 0.58; }

    .app-shell {
      display: grid;
      grid-template-columns: var(--sidebar) 1fr;
      height: 100vh;
      width: 100vw;
      background: var(--bg);
    }

    .sidebar {
      position: relative;
      padding: 14px 10px 20px;
      background: #f0efff;
      border-right: 1px solid rgba(229, 228, 248, 0.8);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .traffic {
      display: flex;
      gap: 8px;
      padding: 0 3px 10px;
      height: 25px;
      align-items: center;
    }
    .dot { width: 12px; height: 12px; border-radius: 999px; background: #dddde7; border: 1px solid #c8c9d7; }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 1px 12px 2px;
    }
    .brand-mark {
      width: 30px; height: 30px; border-radius: 9px 14px 9px 9px;
      background: linear-gradient(135deg, #665dff, #6c58e8);
      box-shadow: 0 8px 18px rgba(99, 91, 255, .2);
      position: relative;
    }
    .brand-mark::after {
      content: "";
      position: absolute;
      left: 8px; top: 8px;
      width: 13px; height: 10px;
      border-radius: 0 999px 999px 0;
      background: #fff;
      opacity: .95;
    }
    .brand-name { font-size: 34px; line-height: 1; font-weight: 800; letter-spacing: 0; color: #17213d; }
    .brand-badge { align-self: flex-start; margin-left: -4px; margin-top: -8px; padding: 4px 8px; font-size: 11px; font-weight: 700; color: #fff; background: #8d83ff; border-radius: 8px 8px 8px 2px; }

    .side-collapse {
      position: absolute;
      top: 52px; right: 24px;
      width: 22px; height: 22px;
      display: grid; place-items: center;
      color: #273452;
    }

    .new-task {
      margin: 4px 0 2px;
      height: 36px;
      border-radius: 999px;
      background: #dfdcff;
      color: #655bff;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .nav-list { display: flex; flex-direction: column; gap: 9px; }
    .nav-item {
      height: 41px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border-radius: 10px;
      color: #394666;
      font-weight: 700;
      font-size: 14px;
      user-select: none;
      transition: .18s ease;
    }
    .nav-item:hover { background: rgba(255,255,255,.72); }
    .nav-item.active {
      background: #fff;
      color: #18233f;
      box-shadow: 0 8px 22px rgba(45, 52, 90, .06);
      border: 1px solid rgba(237, 236, 250, .95);
    }
    .nav-item.seek.active {
      background: #fff;
      box-shadow: 0 8px 22px rgba(45, 52, 90, .06);
    }
    .nav-icon { width: 18px; height: 18px; display: inline-grid; place-items: center; color: #39466a; }
    .nav-divider { height: 1px; background: #e2e1f2; margin: 2px 0 8px; }
    .sidebar-spacer { flex: 1; }
    .side-bottom { display: flex; justify-content: space-between; align-items: center; padding: 0 10px 4px; color: #39466a; }
    .avatar {
      width: 24px; height: 24px; border-radius: 999px;
      background: linear-gradient(135deg, #735eff, #796cff);
      color: #fff; display: grid; place-items: center; font-size: 13px; font-weight: 800;
      box-shadow: 0 8px 18px rgba(99, 91, 255, .23);
    }

    .workspace {
      position: relative;
      padding: 40px 10px 0 0;
      min-width: 760px;
      overflow: hidden;
    }
    .content-card {
      position: relative;
      height: calc(100vh - 40px);
      margin-right: 10px;
      background: var(--panel);
      border-radius: 14px 14px 0 0;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .main-header {
      padding: 26px 26px 12px;
      border-bottom: 0;
      background: var(--panel);
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: flex-start;
    }
    .title-group {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .title-group h1 {
      margin: 0;
      display: inline;
      font-size: 24px;
      letter-spacing: 0;
      color: #17213d;
    }
    .title-group p {
      display: inline;
      margin: 0 0 0 14px;
      color: #7c88a6;
      font-weight: 700;
      line-height: 1.55;
      font-size: 14px;
    }
    .inline-key { font-weight: 800; color: #3e4867; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
    .chip {
      display: inline-flex; align-items: center; gap: 7px;
      height: 28px; padding: 0 10px;
      border-radius: 9px;
      background: #f1f2fa;
      color: #3f4a69;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .chip.purple { background: var(--purple-soft); color: #5147d9; }
    .chip.green { background: var(--green-soft); color: #0d8a5a; }
    .chip.amber { background: var(--amber-soft); color: #9b6900; }
    .chip.red { background: var(--red-soft); color: #bd3041; }
    .chip.blue { background: var(--blue-soft); color: #2366d5; }

    .main-body {
      position: relative;
      flex: 1;
      overflow: auto;
      padding: 16px 26px 88px;
      background: var(--panel);
    }

    .welcome {
      min-height: 440px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 34px 20px;
    }
    .welcome-inner { max-width: 720px; }
    .illustration {
      position: relative;
      margin: 0 auto 22px;
      width: 144px; height: 98px;
    }
    .illu-base {
      position: absolute; left: 8px; right: 8px; bottom: 4px; height: 54px;
      border-radius: 50%; background: linear-gradient(180deg, rgba(99,91,255,.09), rgba(99,91,255,0));
    }
    .illu-folder {
      position: absolute; left: 27px; top: 35px; width: 76px; height: 50px;
      border-radius: 14px 14px 19px 19px;
      background: linear-gradient(135deg, #c7c0ff 0%, #7f73ff 100%);
      box-shadow: 0 22px 34px rgba(99,91,255,.25);
    }
    .illu-folder::before {
      content: ""; position: absolute; left: 13px; top: -10px; width: 42px; height: 16px;
      border-radius: 10px 10px 0 0;
      background: linear-gradient(135deg, #d8d3ff, #a59bff);
      transform: rotate(8deg);
    }
    .illu-doc {
      position: absolute; left: 52px; top: 11px; width: 50px; height: 58px;
      background: #fff; border-radius: 10px;
      box-shadow: 0 18px 28px rgba(81,76,154,.18);
      transform: rotate(2deg);
    }
    .illu-doc::before, .illu-doc::after {
      content: ""; position: absolute; left: 14px; right: 14px; height: 6px; border-radius: 999px; background: #e7e5ff;
    }
    .illu-doc::before { top: 18px; }
    .illu-doc::after { top: 34px; right: 22px; }
    .illu-search {
      position: absolute; right: 18px; bottom: 14px; width: 40px; height: 40px;
      border-radius: 999px; background: #fff;
      display: grid; place-items: center;
      box-shadow: 0 15px 28px rgba(99,91,255,.25);
    }
    .illu-search::before {
      content: ""; width: 18px; height: 18px; border: 4px solid #887cff; border-radius: 999px;
      transform: translate(-2px, -2px);
    }
    .illu-search::after {
      content: ""; position: absolute; width: 15px; height: 4px; border-radius: 999px; background: #887cff;
      transform: rotate(45deg) translate(12px, 12px);
    }
    .welcome h2 { margin: 0; font-size: 22px; color: #152142; letter-spacing: 0; }
    .welcome p { margin: 12px auto 0; max-width: 600px; color: #7a86a4; line-height: 1.75; font-weight: 650; }
    .welcome-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 28px; }

    .primary-btn, .secondary-btn, .ghost-btn, .danger-btn, .green-btn, .amber-btn, .blue-btn {
      min-height: 38px;
      border-radius: 999px;
      padding: 0 16px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-weight: 850;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }
    .primary-btn { background: var(--purple); color: #fff; box-shadow: 0 8px 18px rgba(103, 92, 255, .18); }
    .primary-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 22px rgba(103, 92, 255, .22); }
    .secondary-btn { background: #f2f3fa; color: #3d4968; }
    .secondary-btn:hover { background: #ebedf7; }
    .ghost-btn { background: transparent; color: #5e68e8; min-height: 36px; padding: 0 10px; }
    .ghost-btn:hover { background: var(--purple-soft); }
    .danger-btn { background: var(--red-soft); color: #c33a48; }
    .blue-btn { background: #2f73db; color: #fff; box-shadow: 0 8px 18px rgba(47,115,219,.16); }
    .blue-btn:hover { transform: translateY(-1px); box-shadow: 0 12px 22px rgba(47,115,219,.2); }
    .green-btn { background: #22a971; color: #fff; box-shadow: 0 10px 22px rgba(34, 169, 113, .16); }
    .green-btn:hover { transform: translateY(-1px); box-shadow: 0 13px 26px rgba(34,169,113,.2); }
    .amber-btn { background: #ffedc4; color: #8b5d00; }
    .tiny-btn {
      min-height: 30px; border-radius: 999px; padding: 0 12px;
      font-size: 12px; font-weight: 850; background: #f4f5fb; color: #485572;
      border: 1px solid #e6e8f4;
    }
    .tiny-btn:hover { background: #eceef9; }

    .prototype-switcher {
      position: absolute;
      top: 14px;
      right: 16px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px;
      border-radius: 999px;
      background: rgba(246,247,255,.92);
      border: 1px solid #e8eaf7;
      box-shadow: 0 8px 22px rgba(35, 42, 74, .06);
    }
    .prototype-label { padding: 0 6px; color: #8a94ad; font-size: 11px; font-weight: 850; }
    .scenario-btn {
      height: 24px; padding: 0 8px; border-radius: 999px;
      color: #6d7790; background: transparent; font-size: 11px; font-weight: 900;
      border: 0;
    }
    .scenario-btn.active { background: #fff; color: #5147d9; box-shadow: 0 2px 8px rgba(41, 48, 82, .08); }

    .mini-tag {
      height: 24px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      border-radius: 999px;
      background: #f2f3fa;
      color: #69738d;
      font-size: 11px;
      font-weight: 850;
      white-space: nowrap;
    }
    .mini-tag.required { background: #f5f1ff; color: #6257dc; }
    .mini-tag.optional { background: #f2f5fa; color: #687286; }
    .small-status {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 11px;
      font-weight: 950;
      background: #edf0f8;
      color: #7a849b;
    }
    .small-status.ok { background: var(--green-soft); color: var(--green); }
    .small-status.warn { background: var(--amber-soft); color: #a16b00; }
    .small-status.missing { background: var(--red-soft); color: var(--red); }

    .results-workbench {
      display: grid;
      grid-template-columns: 260px minmax(420px, 1fr) 330px;
      gap: 16px;
      min-height: 620px;
      align-items: stretch;
    }
    .session-rail, .candidate-pane, .detail-pane, .repair-panel, .empty-panel {
      border: 1px solid #e7e8f6;
      background: #fbfbff;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(40,48,90,.04);
    }
    .session-rail, .candidate-pane, .detail-pane {
      min-height: 620px;
      overflow: hidden;
    }
    .pane-head {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #edf0fa;
    }
    .pane-kicker {
      color: #7d87a1;
      font-size: 12px;
      font-weight: 850;
    }
    .pane-head h2, .pane-head h3 {
      margin: 5px 0 0;
      font-size: 18px;
      color: #17213d;
      letter-spacing: 0;
    }
    .detail-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 5px;
    }
    .detail-name-row h3 {
      margin: 0;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .resume-inline-btn {
      min-height: 30px;
      padding: 0 12px;
      flex: 0 0 auto;
      font-size: 12px;
      box-shadow: 0 6px 14px rgba(103, 92, 255, .14);
    }
    .pane-sub {
      margin: 7px 0 0;
      color: #7b86a2;
      font-size: 12px;
      line-height: 1.55;
      font-weight: 650;
    }
    .session-list {
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 6px;
    }
    .session-item {
      width: 100%;
      text-align: left;
      padding: 12px;
      border-radius: 10px;
      background: transparent;
      color: #273452;
      border: 1px solid transparent;
      transition: background .16s ease, border-color .16s ease, transform .16s ease;
    }
    .session-item:hover { background: #f5f6ff; }
    .session-item.active {
      background: #fff;
      border-color: #cbc7ff;
      box-shadow: 0 8px 18px rgba(99,91,255,.08);
    }
    .session-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      font-size: 14px;
      font-weight: 900;
    }
    .session-status {
      flex: 0 0 auto;
      color: #0d8a5a;
      font-size: 11px;
      font-weight: 900;
      background: var(--green-soft);
      border-radius: 999px;
      padding: 3px 7px;
    }
    .session-meta {
      margin-top: 6px;
      color: #7d87a1;
      line-height: 1.45;
      font-size: 12px;
      font-weight: 700;
    }
    .session-stats {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      color: #6d7790;
      font-size: 12px;
      font-weight: 850;
    }
    .session-stats span { white-space: nowrap; }
    .candidate-toolbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 16px 12px;
      border-bottom: 1px solid #edf0fa;
    }
    .candidate-toolbar h2 { margin: 0; font-size: 18px; }
    .candidate-toolbar p {
      margin: 7px 0 0;
      color: #7b86a2;
      font-size: 13px;
      line-height: 1.55;
      font-weight: 650;
    }
    .source-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      flex: 0 0 auto;
      max-width: 190px;
    }
    .candidate-list {
      display: flex;
      flex-direction: column;
      padding: 8px;
    }
    .candidate-row {
      width: 100%;
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-height: 84px;
      padding: 10px 12px;
      border-radius: 10px;
      text-align: left;
      background: transparent;
      border: 1px solid transparent;
      color: #273452;
    }
    .candidate-row:hover { background: #f7f8ff; }
    .candidate-row.active {
      background: #fff;
      border-color: #d8d6ff;
      box-shadow: 0 8px 18px rgba(35,42,74,.05);
    }
    .candidate-score {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: #eef8f2;
      color: #0d8a5a;
      font-weight: 950;
      font-size: 15px;
    }
    .candidate-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      font-size: 15px;
      font-weight: 900;
    }
    .candidate-name span:first-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .candidate-role {
      margin-top: 4px;
      color: #5f6c88;
      font-size: 12px;
      line-height: 1.45;
      font-weight: 750;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .candidate-summary {
      margin-top: 5px;
      color: #8993aa;
      font-size: 12px;
      line-height: 1.45;
      font-weight: 650;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .candidate-contact {
      color: #66718d;
      font-size: 12px;
      font-weight: 850;
      text-align: right;
      white-space: nowrap;
    }
    .detail-pane {
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .detail-body {
      padding: 16px;
      overflow: auto;
    }
    .detail-main-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }
    .detail-main-title h3 { margin: 0; font-size: 20px; letter-spacing: 0; }
    .detail-main-title p {
      margin: 7px 0 0;
      color: #69738d;
      font-size: 13px;
      line-height: 1.55;
      font-weight: 700;
    }
    .detail-section {
      margin-top: 16px;
      padding-top: 15px;
      border-top: 1px solid #edf0fa;
    }
    .detail-section h4 {
      margin: 0 0 9px;
      color: #303b59;
      font-size: 13px;
      font-weight: 950;
    }
    .detail-section p {
      margin: 0;
      color: #5d6884;
      font-size: 13px;
      line-height: 1.65;
      font-weight: 650;
    }
    .evidence-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }
    .evidence-list li {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 8px;
      color: #5d6884;
      font-size: 13px;
      line-height: 1.55;
      font-weight: 650;
    }
    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .repair-layout {
      min-height: 620px;
    }
    .repair-panel, .empty-panel {
      padding: 22px;
    }
    .repair-panel h2, .empty-panel h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0;
    }
    .repair-panel p, .empty-panel p {
      margin: 10px 0 0;
      max-width: 620px;
      color: #6d7790;
      line-height: 1.7;
      font-weight: 650;
    }
    .flow-board {
      position: relative;
      margin-top: 20px;
      display: grid;
      grid-template-columns: .96fr 1.04fr 1fr;
      grid-template-rows: 132px minmax(254px, 1fr);
      gap: 54px 28px;
      min-height: 470px;
      padding: 4px 0 0;
    }
    .flow-arrows {
      position: absolute;
      top: 4px;
      left: 0;
      width: 100%;
      height: 132px;
      pointer-events: none;
      z-index: 3;
      overflow: visible;
    }
    .flow-arrow {
      fill: none;
      stroke: #675cff;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .72;
      filter: drop-shadow(0 4px 8px rgba(99,91,255,.12));
      vector-effect: non-scaling-stroke;
    }
    .flow-arrow-head {
      fill: none;
      stroke: #675cff;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .72;
      vector-effect: non-scaling-stroke;
    }
    .flow-node, .flow-detail {
      position: relative;
      z-index: 2;
      border: 1px solid #e6e8f6;
    }
    .flow-node {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 13px;
      align-items: center;
      align-self: center;
      justify-self: center;
      min-height: 118px;
      width: 92%;
      padding: 17px 19px;
      border-radius: 36px;
      background: var(--node-bg);
      border-color: var(--node-line);
      border-width: 2px;
      box-shadow: 0 18px 34px var(--node-shadow);
      z-index: 4;
    }
    .flow-node.current {
      box-shadow: 0 24px 42px var(--node-shadow);
      transform: translateY(-2px);
    }
    .flow-node.done {
      background: var(--node-bg);
      border-color: var(--node-line);
    }
    .node-service {
      grid-column: 1; grid-row: 1;

    .node-browser {
      grid-column: 2; grid-row: 1; width: 88%; min-height: 124px;

    }
    .node-source {
      grid-column: 3; grid-row: 1;
      --node-bg: #ecf9f3; --node-line: #bde8d2; --node-accent: #19a66e; --node-shadow: rgba(25,166,110,.15);
    }
    .node-icon {
      width: 54px;
      height: 54px;
      border-radius: 21px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: var(--node-accent);
      font-weight: 950;
      font-size: 23px;
      box-shadow: inset 0 -8px 18px rgba(23,34,59,.12), 0 10px 18px var(--node-shadow);
    }
    .node-title {
      display: block;
      color: #24304d;
      font-size: 17px;
      font-weight: 950;
    }
    .node-copy {
      display: block;
      margin-top: 5px;
      color: #7b86a2;
      line-height: 1.55;
      font-size: 13px;
      font-weight: 650;
    }
    .node-status {
      margin-top: 9px;
      width: fit-content;
      height: 26px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border-radius: 999px;
      background: #f2f3fa;
      color: #69738d;
      font-size: 11px;
      font-weight: 900;
    }
    .node-status.ok { background: var(--green-soft); color: #0d8a5a; }
    .node-status.missing { background: var(--red-soft); color: #bd3041; }
    .node-status.checking { background: var(--blue-soft); color: #2366d5; }
    .flow-detail {
      position: relative;
      padding: 18px;
      border-radius: 28px;
      align-self: stretch;
      background: rgba(254,254,255,.9);
      border-color: #ebeef8;
      box-shadow: 0 8px 20px rgba(40,48,90,.035);
    }
    .flow-detail::before {
      content: "";
      position: absolute;
      top: -44px;
      left: 50%;
      height: 34px;
      border-left: 2px dashed var(--detail-accent);
      opacity: .48;
    }
    .flow-detail::after {
      content: "";
      position: absolute;
      top: -15px;
      left: calc(50% - 5px);
      width: 9px;
      height: 9px;
      border: solid var(--detail-accent);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
      opacity: .48;

    .detail-service {
      grid-column: 1; grid-row: 2; align-self: start; min-height: 176px; width: 94%; justify-self: center;
      --detail-accent: #675cff; --detail-soft: #f1efff;
    }
    .detail-browser {
      grid-column: 2; grid-row: 2; align-self: start; min-height: 224px; width: 94%; justify-self: center;

    }
    .detail-source {
      grid-column: 3; grid-row: 2; align-self: start; min-height: 244px; width: 94%; justify-self: center;

    .flow-detail h3 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
      color: #24304d;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .inline-status {
      height: 24px;
      display: inline-flex;
      align-items: center;
      padding: 0 9px;
      border-radius: 999px;
      background: #f2f3fa;
      color: #69738d;
      font-size: 11px;
      font-weight: 900;
    }
    .flow-detail h3::before {
      content: "";
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: var(--detail-soft);
      border: 5px solid var(--detail-accent);
      box-sizing: border-box;
      flex: 0 0 auto;
    }
    .flow-detail p {
      margin: 8px 0 0;
      color: #73809c;
      line-height: 1.6;
      font-size: 13px;
      font-weight: 650;
    }
    .detail-actions, .empty-actions {
      display: flex;
      gap: 9px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .link-row {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }
    .soft-link {
      width: fit-content;
      color: #5e68e8;
      font-size: 13px;
      font-weight: 850;
      text-decoration: none;
      border-radius: 999px;
      padding: 5px 9px;
    }
    .link-button {
      border: 0;
      background: transparent;
      cursor: pointer;
      font: inherit;
    }
    .soft-link:hover { background: var(--purple-soft); }
    .source-switch {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      padding: 4px;
      width: fit-content;
      border-radius: 999px;
      background: #f1f2fa;
    }
    .source-option {
      height: 30px;
      border-radius: 999px;
      padding: 0 12px;
      background: transparent;
      color: #68738e;
      font-size: 13px;
      font-weight: 900;
    }
    .source-option.active {
      background: #fff;
      color: #5147d9;
      box-shadow: 0 4px 10px rgba(40,48,90,.08);
    }
    .source-detail {
      margin-top: 14px;
      padding: 13px 14px;
      border-radius: 22px;
      background: #f8f9ff;
      border: 1px solid #edf0fa;
    }
    .source-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      color: #6d7790;
      font-size: 13px;
      font-weight: 750;
    }

      color: #273452;
      font-weight: 900;
      white-space: nowrap;
    }
    .empty-panel {
      min-height: 520px;
      display: grid;
      align-content: center;
      justify-items: start;
      max-width: 760px;
      margin: 0 auto;

    .checking-view {
      max-width: 860px;
      margin: 0 auto;
      padding: 10px 0 30px;
    }
    .checking-hero {
      padding: 18px;
      border-radius: 12px;
      background: #fbfbff;
      border: 1px solid #e8e9f7;
    }

      width: 100%; height: 10px; border-radius: 999px; background: #eceef8; overflow: hidden; margin-top: 18px;
    }
    .progress-fill { height: 100%; width: var(--progress, 0%); border-radius: inherit; background: var(--purple); transition: width .35s ease; }
    .checking-list { margin-top: 18px; display: grid; gap: 10px; }
    .check-row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 13px 14px; border-radius: 12px; background: #fff; border: 1px solid #eceef8;
    }
    .check-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .spinner {
      width: 18px; height: 18px; border: 3px solid #d8dcf0; border-top-color: var(--purple); border-radius: 999px;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sticky-launch { display: none; }
    .launch-disabled:disabled {
      opacity: 1;
      background: #eef0f6;
      color: #8a94aa;
      box-shadow: none;
    }

    .drawer-backdrop {
      position: fixed; inset: 0; background: rgba(23, 34, 59, .18);
      z-index: 40;
      display: none;
      backdrop-filter: blur(2px);
    }
    .drawer-backdrop.show { display: block; }
    .drawer {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(480px, 94vw);
      background: #fff;
      z-index: 50;
      box-shadow: -24px 0 60px rgba(23,34,59,.18);
      transform: translateX(105%);
      transition: transform .22s ease;
      display: flex;
      flex-direction: column;
    }
    .drawer.show { transform: translateX(0); }
    .drawer-head {
      padding: 22px 22px 16px;
      border-bottom: 1px solid #eceef9;
      display: flex; justify-content: space-between; gap: 12px; align-items: flex-start;
    }
    .drawer-head h2 { margin: 0; font-size: 20px; }
    .drawer-head p { margin: 8px 0 0; color: #7a86a4; line-height: 1.55; font-size: 13px; font-weight: 650; }
    .close-btn { width: 34px; height: 34px; border-radius: 12px; background: #f2f3fb; color: #53607e; font-size: 20px; }
    .drawer-body { padding: 20px 22px 110px; overflow: auto; }
    .drawer-section { margin-bottom: 18px; }
    .drawer-section h3 { margin: 0 0 10px; font-size: 14px; color: #2e3a58; }
    .guide-steps { display: grid; gap: 10px; }
    .guide-step {
      display: grid; grid-template-columns: 28px 1fr; gap: 10px;
      padding: 12px; border-radius: 14px; background: #fbfbff; border: 1px solid #eceef9;
    }
    .guide-step-num { width: 28px; height: 28px; border-radius: 10px; background: var(--purple-soft); color: var(--purple); display: grid; place-items: center; font-weight: 950; }
    .guide-step-title { font-weight: 900; }
    .guide-step-desc { margin-top: 4px; color: #7a86a4; line-height: 1.55; font-size: 13px; font-weight: 650; }
    .input-row { display: grid; gap: 8px; margin-top: 12px; }
    .input-label { color: #67728d; font-size: 12px; font-weight: 900; }
    .text-input {
      width: 100%; min-height: 42px; border-radius: 12px; border: 1px solid #e4e7f5; background: #fbfcff;
      padding: 0 12px; color: #24304d; outline: none; font-weight: 700;
    }
    .text-input:focus { border-color: #9b92ff; box-shadow: 0 0 0 4px rgba(99,91,255,.1); }
    .drawer-actions {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 16px 22px 20px;
      background: linear-gradient(180deg, rgba(255,255,255,.84), #fff 35%);
      border-top: 1px solid #eceef9;
      display: flex; justify-content: flex-end; gap: 10px;
    }

    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(23,34,59,.24);
      display: none; place-items: center;
      z-index: 60;
      backdrop-filter: blur(3px);
    }
    .modal-backdrop.show { display: grid; }
    .launch-modal {
      width: min(520px, 92vw);
      padding: 24px;
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 26px 80px rgba(23,34,59,.26);
    }
    .launch-modal h2 { margin: 0; font-size: 21px; }
    .launch-modal p { margin: 9px 0 0; color: #72809c; line-height: 1.65; font-weight: 650; }
    .launch-steps { display: grid; gap: 10px; margin-top: 18px; }
    .launch-step { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 14px; background: #fbfbff; border: 1px solid #eceef9; color: #4d5873; font-weight: 800; }
    .launch-step.done .spinner { display: none; }
    .launch-step.done .small-status { display: grid; }
    .launch-step .small-status { display: none; }

    .toast {
      position: fixed;
      left: 50%; bottom: 26px;
      transform: translateX(-50%) translateY(20px);
      z-index: 80;
      padding: 12px 16px;
      border-radius: 999px;
      background: #1d263b;
      color: #fff;
      font-size: 13px; font-weight: 850;
      box-shadow: 0 16px 40px rgba(29,38,59,.22);
      opacity: 0; pointer-events: none;
      transition: .22s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .muted { color: var(--muted); }
    .hide { display: none !important; }

    @media (max-width: 1120px) {
      .results-workbench { grid-template-columns: 1fr; }
      .session-rail, .candidate-pane, .detail-pane { min-height: auto; }
      .source-tags { justify-content: flex-start; max-width: none; }
      .flow-board {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
      }
      .node-service, .node-browser, .node-source,
      .detail-service, .detail-browser, .detail-source {
        grid-column: 1;
        grid-row: auto;
        width: 100%;
        justify-self: stretch;
      }
      .flow-arrows { display: none; }
    }

    @media (max-width: 880px) {
      :root { --sidebar: 78px; }
      .brand-name, .brand-badge, .side-collapse, .new-task span, .nav-item span:not(.nav-icon), .nav-divider, .side-bottom .nav-icon { display: none; }
      .brand-row { justify-content: center; padding: 0; }
      .new-task { width: 48px; margin: 4px auto; }
      .nav-item { justify-content: center; padding: 0; }
      .workspace { min-width: 0; padding: 14px 8px 0 0; }
      .content-card { height: calc(100vh - 14px); }
      .header-top { display: block; }
      .main-header { padding: 22px 18px 10px; }
      .main-body { padding: 14px 18px 72px; }
      .candidate-row { grid-template-columns: 42px minmax(0, 1fr); }
      .candidate-contact { grid-column: 2; text-align: left; }
    }
  </style>
</head>
<body>
  <div class="app-shell">

  <script>
    const depsTemplate = [
      {

    const sessions = [
      {

      const s = prototypeStates[name] || prototypeStates.results;

      state.selectedSessionId = state.prototypeState === 'results' ? firstSession.id : null;

      state.launchMode = 'full';
      if (!options.skipHash) {

      const pending = state.deps.find(d => d.status !== 'ok');
      return (required || pending || state.deps[0])?.id || null;

      const warn = state.deps.filter(d => d.status === 'warn').length;
      const unknown = state.deps.filter(d => d.status === 'unknown').length;
      const allRequiredOk = required.every(d => d.status === 'ok');

            <h2>${ready ? '准备完成' : '启动准备'}</h2>
            <div class="flow-board">
              <svg class="flow-arrows" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                <path class="flow-arrow" d="M 29.3 50 H 34.1"></path>
                <path class="flow-arrow-head" d="M 34.1 50 L 33.3 46.2 M 34.1 50 L 33.3 53.8"></path>
                <path class="flow-arrow" d="M 64 50 H 68.6"></path>
                <path class="flow-arrow-head" d="M 68.6 50 L 67.8 46.2 M 68.6 50 L 67.8 53.8"></path>
              </svg>
              ${steps.map(step => renderFlowNode(step, current.id)).join('')}
              ${renderServiceDetail()}
              ${renderBrowserDetail()}
              ${renderDataSourceDetail(ready)}
            </div>
          </section>
        </div>
      `;
    }

    function getBlockedSteps() {
      const localStatus = dep('localService')?.status || 'missing';
      const browserStatus = dep('opencli')?.status || 'unknown';
      const dataSourceStatus = getDataSourceStatus();
      return [
        {
          id: 'localService',
          index: 1,
          title: '本地运行服务',
          copy: '',
          status: localStatus,
          meta: statusMeta[localStatus] || statusMeta.unknown
        },
        {
          id: 'browserHelper',
          index: 2,
          title: '浏览器助手',
          copy: '',
          status: browserStatus,
          meta: statusMeta[browserStatus] || statusMeta.unknown
        },
        {
          id: 'dataSource',
          index: 3,
          title: '数据源',
          copy: '',
          status: dataSourceStatus,
          meta: statusMeta[dataSourceStatus] || statusMeta.unknown
        }
      ];
    }

    function getDataSourceStatus() {
      const selected = state.selectedDataSource === 'localResumeLibrary' ? 'localResumeLibrary' : 'liepinLogin';
      return dep(selected)?.status || 'unknown';
    }

    function renderFlowNode(step, currentId) {
      const stateClass = step.status === 'ok' ? 'done' : step.id === currentId ? 'current' : '';
      const nodeClass = {
        localService: 'node-service',
        browserHelper: 'node-browser',
        dataSource: 'node-source'
      }[step.id];
      const icon = {
        localService: '⌘',
        browserHelper: '◎',
        dataSource: '▦'
      }[step.id];
      return `
        <section class="flow-node ${nodeClass} ${stateClass}" aria-label="${step.title}">
          <div class="node-icon">${step.status === 'ok' ? '✓' : icon}</div>
          <div>
            <span class="node-title">${step.title}</span>
            <span class="node-status ${step.meta.cls}">${step.meta.label}</span>
          </div>
        </section>
      `;
    }

    function renderServiceDetail() {
      return `
        <section class="flow-detail detail-service" aria-label="本地运行服务详情">
          <h3>本地服务交给 Domi</h3>
          <div class="detail-actions">
            <button class="primary-btn" data-action="install-local-service"><span aria-hidden="true">⇩</span><span>安装 / 更新本地服务</span></button>
          </div>
        </section>
      `;
    }

    function renderBrowserDetail() {
      return `
        <section class="flow-detail detail-browser" aria-label="浏览器助手详情">
          <h3>浏览器助手 <span class="inline-status">${statusMeta[dep('opencli')?.status || 'unknown'].label}</span></h3>
          <div class="link-row">
            <button class="soft-link link-button" data-action="toast" data-message="原型：这里会下载浏览器助手。">⇩ 下载浏览器助手</button>
            <button class="soft-link link-button" data-action="open-plugin-install">浏览器助手安装教程</button>
          </div>
          <div class="detail-actions">
            <button class="secondary-btn" data-action="check-browser-helper"><span aria-hidden="true">◎</span><span>检测浏览器助手状态</span></button>
          </div>
        </section>
      `;
    }

    function renderDataSourceDetail(ready) {
      const selected = state.selectedDataSource === 'localResumeLibrary' ? 'localResumeLibrary' : 'liepinLogin';
      const source = dep(selected);
      const meta = statusMeta[source?.status || 'unknown'];
      const isLiepin = selected === 'liepinLogin';
      return `
        <section class="flow-detail detail-source" aria-label="数据源详情">
          <h3>数据源</h3>
          <div class="source-switch" aria-label="数据源选择">
            <button class="source-option ${isLiepin ? 'active' : ''}" data-source-id="liepinLogin">猎聘</button>
            <button class="source-option ${!isLiepin ? 'active' : ''}" data-source-id="localResumeLibrary">本地简历库</button>
          </div>
          <div class="source-detail">
            <div class="source-line"><span>${isLiepin ? '登录态' : '连接状态'}</span><b>${meta.label}</b></div>
          </div>
          <div class="detail-actions">
            ${ready
              ? '<button class="primary-btn" data-action="launch" data-mode="full">启动</button>'
              : `<button class="secondary-btn" data-action="${isLiepin ? 'check-liepin-login' : 'check-local-resume-library'}"><span aria-hidden="true">◎</span><span>${isLiepin ? '检测猎聘登录状态' : '检测本地简历库状态'}</span></button>`}
          </div>
        </section>
      `;
    }

    function selectDataSource(id) {
      if (!['liepinLogin', 'localResumeLibrary'].includes(id)) return;
      state.selectedDataSource = id;
      render();
    }

    function renderEmptyState() {
      return `
        <section class="empty-panel" aria-label="空结果">
          <span class="chip purple">首次使用</span>
          <h2>还没有最近结果</h2>
          <p>完成一次 SeekTalent 检索后，这里会按 JD 保留最近检索记录，并展示每次检索的候选人 Top 10、联系方式、短评和简历入口。</p>
          <div class="empty-actions">
            <button class="primary-btn" data-action="launch" data-mode="full">检测并启动</button>
          </div>
        </section>
      `;
    }

    function renderStickyLaunch() {
      $('#stickyLaunch').innerHTML = '';
    }

    function bindDynamicEvents(scope = document) {
      scope.querySelectorAll('[data-prototype-state]').forEach(el => el.onclick = () => applyPrototypeState(el.dataset.prototypeState));
      scope.querySelectorAll('[data-tab-jump]').forEach(el => el.onclick = () => applyPrototypeState(el.dataset.tabJump === 'results' ? 'results' : 'blocked'));
      scope.querySelectorAll('[data-session-id]').forEach(el => el.onclick = () => selectSession(el.dataset.sessionId));
      scope.querySelectorAll('[data-candidate-id]').forEach(el => el.onclick = () => selectCandidate(el.dataset.candidateId));
      scope.querySelectorAll('[data-source-id]').forEach(el => el.onclick = () => selectDataSource(el.dataset.sourceId));
      scope.querySelectorAll('[data-action="start-check"]').forEach(el => el.onclick = runCheck);
      scope.querySelectorAll('[data-action="open-guide"]').forEach(el => el.onclick = () => openGuide(el.dataset.id));
      scope.querySelectorAll('[data-action="select-dep"]').forEach(el => {
        el.onclick = () => selectDep(el.dataset.id);
        el.onkeydown = event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            selectDep(el.dataset.id);
          }
        };
      });
      scope.querySelectorAll('[data-action="single-check"]').forEach(el => el.onclick = () => singleCheck(el.dataset.id));
      scope.querySelectorAll('[data-action="save-config"]').forEach(el => el.onclick = () => saveConfig(el.dataset.id));
      scope.querySelectorAll('[data-action="edit-config"]').forEach(el => el.onclick = () => editConfig(el.dataset.id));
      scope.querySelectorAll('[data-action="focus-dep"]').forEach(el => el.onclick = () => focusDep(el.dataset.id));
      scope.querySelectorAll('[data-action="install-local-service"]').forEach(el => el.onclick = installLocalService);
      scope.querySelectorAll('[data-action="check-browser-helper"]').forEach(el => el.onclick = checkBrowserHelper);
      scope.querySelectorAll('[data-action="open-plugin-install"]').forEach(el => el.onclick = openPluginInstall);
      scope.querySelectorAll('[data-action="check-liepin-login"]').forEach(el => el.onclick = checkLiepinLogin);
      scope.querySelectorAll('[data-action="check-local-resume-library"]').forEach(el => el.onclick = checkLocalResumeLibrary);
      scope.querySelectorAll('[data-action="launch"]').forEach(el => el.onclick = () => launchSeekTalent(el.dataset.mode || 'full'));
      scope.querySelectorAll('[data-action="open-folder"]').forEach(el => el.onclick = () => toast('原型：这里会打开本地结果文件夹。'));
      scope.querySelectorAll('[data-action="open-workbench"]').forEach(el => el.onclick = () => toast('原型：这里会进入真实 SeekTalent 工作台。'));
      scope.querySelectorAll('[data-action="open-resume"]').forEach(el => el.onclick = () => toast('原型：这里会打开候选人的简历入口。'));
      scope.querySelectorAll('[data-action="toast"]').forEach(el => el.onclick = () => toast(el.dataset.message || '已完成'));
      scope.querySelectorAll('[data-action="toggle-candidate"]').forEach(el => el.onclick = () => toggleCandidate(el.dataset.candidate));
      renderPrototypeSwitcher();
    }

    function selectDep(id) {
      if (!id || !dep(id)) return;
      state.selectedDepId = id;
      render();
    }

    async function runCheck() {
      const previousStatuses = Object.fromEntries(state.deps.map(d => [d.id, d.status]));
      const previousSelected = state.selectedDepId;
      state.prototypeState = 'blocked';
      if (window.location.hash !== '#blocked') history.replaceState(null, '', '#blocked');
      state.checked = true;
      state.checking = true;
      state.checkProgress = 0;
      state.launched = false;
      state.deps = depsTemplate.map(d => ({...d, status: 'unknown'}));
      state.editingDeps = new Set();
      render();
      const target = {...prototypeStates.results.statuses};
      Object.entries(previousStatuses).forEach(([id, status]) => {
        if (status === 'ok') target[id] = 'ok';
      });
      for (let i = 0; i < state.deps.length; i++) {
        state.deps[i].status = 'checking';
        state.checkProgress = Math.round((i / state.deps.length) * 88);
        render();
        await sleep(520);
        state.deps[i].status = target[state.deps[i].id];
        state.checkProgress = Math.round(((i + 1) / state.deps.length) * 100);
        render();
        await sleep(180);
      }
      state.checking = false;
      state.prototypeState = 'results';
      state.launched = true;
      state.selectedSessionId = sessions[0].id;
      state.selectedCandidateId = sessions[0].candidates[0]?.id || null;
      if (window.location.hash !== '#results') history.replaceState(null, '', '#results');
      if (!previousSelected || dep(previousSelected)?.status === 'ok') state.selectedDepId = getDefaultDepId();
      render();
      const readiness = getReadiness();
      const pending = readiness.missing + readiness.warn + readiness.unknown;
      toast(pending ? `检测完成：还有 ${pending} 项需要处理。` : '检测完成：全部就绪。');
    }

    async function singleCheck(id) {
      setDepStatus(id, 'checking');
      state.checked = true;
      render();
      await sleep(600);
      const current = dep(id)?.status;
      const target = current === 'ok' ? 'ok' : (prototypeStates.blocked.statuses[id] || 'ok');
      setDepStatus(id, target);
      render();
      toast(`${dep(id).name}：${statusMeta[target].label}`);
    }

    async function saveConfig(id, options = {}) {
      const d = dep(id);
      if (!d) return;
      setDepStatus(id, 'checking');
      state.checked = true;
      render();
      await sleep(650);
      setDepStatus(id, 'ok');
      state.editingDeps.delete(id);
      render();
      if (!options.silent) toast(`${d.name} 已保存并通过测试。`);
    }

    function editConfig(id) {
      if (!id) return;
      state.selectedDepId = id;
      state.editingDeps.add(id);
      render();
    }

    function focusDep(id, options = {}) {
      if (!id) return;
      state.prototypeState = 'blocked';
      state.selectedDepId = id;
      state.editingDeps.add(id);
      render();
      const card = document.querySelector(`[data-dep-id="${id}"]`);
      card?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      if (!options.silent) toast('已定位到配置项。');
    }

    async function installLocalService() {
      const stayInBlockedFlow = state.prototypeState === 'blocked';
      setDepStatus('localService', 'checking');
      state.checked = true;
      render();
      await sleep(700);
      setDepStatus('localService', 'ok');
      if (stayInBlockedFlow) {
        state.launched = false;
        render();
        toast('本地运行服务已就绪。');
        return;
      }
      state.prototypeState = 'results';
      state.launched = true;
      state.selectedSessionId = sessions[0].id;
      state.selectedCandidateId = sessions[0].candidates[0]?.id || null;
      if (window.location.hash !== '#results') history.replaceState(null, '', '#results');
      render();
      toast('本地运行服务已就绪。');
    }

    async function checkBrowserHelper() {
      setDepStatus('opencli', 'checking');
      state.checked = true;
      render();
      await sleep(700);
      setDepStatus('opencli', 'ok');
      render();
      toast('浏览器助手已连接。');
    }

    function openPluginInstall() {
      toast('原型：这里会打开浏览器插件安装指引。');
    }

    async function checkLiepinLogin() {
      setDepStatus('liepinLogin', 'checking');
      state.checked = true;
      render();
      await sleep(700);
      setDepStatus('liepinLogin', 'ok');
      render();
      toast('猎聘已确认。');
    }

    async function checkLocalResumeLibrary() {
      setDepStatus('localResumeLibrary', 'checking');
      state.checked = true;
      render();
      await sleep(700);
      setDepStatus('localResumeLibrary', 'ok');
      render();
      toast('本地简历库已确认。');
    }

    function openGuide(id) {
      const d = dep(id);
      if (!d) return;
      state.drawerId = id;
      $('#drawerTitle').textContent = d.name;
      $('#drawerDesc').textContent = d.why;
      $('#drawerBody').innerHTML = `
        <div class="drawer-section">
          <h3>配置步骤</h3>
          <div class="guide-steps">
            ${d.steps.map((s, i) => `
              <div class="guide-step">
                <div class="guide-step-num">${i + 1}</div>
                <div><div class="guide-step-title">${s[0]}</div><div class="guide-step-desc">${s[1]}</div></div>
              </div>`).join('')}
          </div>
        </div>
        ${d.fields.length ? `<div class="drawer-section"><h3>本地配置示例</h3>${d.fields.map(f => `<div class="input-row"><label class="input-label">${f.label}</label><input class="text-input" placeholder="${f.placeholder}" /></div>`).join('')}<p class="muted" style="line-height:1.6;font-size:12px;font-weight:650;margin-top:10px">原型提示：这些字段用于展示交互，需要替换成 SeekTalent 项目里的真实配置项。</p></div>` : ''}
      `;
      $('#drawerBackdrop').classList.add('show');
      $('#guideDrawer').classList.add('show');
    }

    function closeGuide() {
      $('#drawerBackdrop').classList.remove('show');
      $('#guideDrawer').classList.remove('show');
      state.drawerId = null;
    }

    async function drawerRetest() {
      const id = state.drawerId;
      if (!id) return;
      closeGuide();
      await singleCheck(id);
    }

    function drawerMarkDone() {
      const id = state.drawerId;
      if (!id) return;
      setDepStatus(id, 'ok');
      state.checked = true;
      closeGuide();
      render();
      toast(`${dep(id).name} 已标记为就绪。`);
    }

    async function launchSeekTalent(mode) {
      state.launchMode = mode;
      const steps = ['启动本地运行服务', '加载工作台', '检查浏览器助手', '检测数据源'];
      $('#launchTitle').textContent = '正在启动 SeekTalent…';
      $('#launchDesc').textContent = '本地运行服务准备完成后，会进入 SeekTalent 工作台。';
      $('#launchSteps').innerHTML = steps.map(s => `<div class="launch-step"><div class="spinner"></div><span class="small-status ok">✓</span><span>${s}</span></div>`).join('');
      $('#launchModal').classList.add('show');
      const rows = $$('.launch-step');
      for (const row of rows) {
        await sleep(620);
        row.classList.add('done');
      }
      await sleep(420);
      $('#launchModal').classList.remove('show');
      state.launched = true;
      state.prototypeState = 'results';
      state.deps.forEach(d => d.status = 'ok');
      state.selectedSessionId = sessions[0].id;
      state.selectedCandidateId = sessions[0].candidates[0]?.id || null;
      if (window.location.hash !== '#results') history.replaceState(null, '', '#results');
      render();
      toast('SeekTalent 已启动。');
    }

    function toggleCandidate(index) {
      const card = document.querySelector(`[data-candidate="${index}"]`);
      if (card) card.classList.toggle('open');
    }

    function toast(message) {
      const el = $('#toast');
      el.textContent = message;
      el.classList.add('show');
      clearTimeout(toast._t);
      toast._t = setTimeout(() => el.classList.remove('show'), 2400);
    }

    function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }

    window.addEventListener('hashchange', () => applyPrototypeState(prototypeStateFromHash(), { skipHash: true }));
    $('#closeDrawer').addEventListener('click', closeGuide);
    $('#drawerBackdrop').addEventListener('click', closeGuide);
    $('#drawerRetest').addEventListener('click', drawerRetest);
    $('#drawerMarkDone').addEventListener('click', drawerMarkDone);

    applyPrototypeState(prototypeStateFromHash());
  </script>
</body>
</html>
