name: Native launch-binding probe

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/native-launch-binding-probe.yml"
      - ".github/workflows/build-macos-intel-offline.yml"
      - "scripts/build_offline_macos_intel.py"
      - "scripts/install-seektalent-domi.ps1"
      - "scripts/install-seektalent-domi.sh"
      - "scripts/install-seektalent-staging.sh"
      - "scripts/install_staging_browser_bridge.py"
      - "scripts/offline/install-offline-macos-intel.sh"
      - "src/seektalent/browser_bridge_install.py"
      - "src/seektalent/browser_bridge_manifest.py"
      - "src/seektalent/domi_bootstrap.py"
      - "src/seektalent/opencli_browser/**"
      - "src/seektalent/opencli_launcher.py"
      - "tests/browser_bridge_bundle_fixtures.py"
      - "tests/test_wtscli_bundle_binding.py"
      - "tools/native_probes/**"
      - "tests/test_native_launch_binding_probe.py"
      - "tests/test_installed_slot_lease.py"
      - "tests/test_windows_installed_binding.py"
      - "tests/test_windows_sidecar_process.py"
      - "tests/test_packaged_sidecar_artifact.py"
      - "tests/test_sidecar_readiness.py"
      - "tools/build_packaged_sidecar.py"
      - "src/seektalent/windows_installed_binding.py"
      - "src/seektalent/windows_native_files.py"
      - "src/seektalent/windows_sidecar_process.py"
      - "src/seektalent/installed_release.py"
      - "src/seektalent/installed_filesystem.py"
      - "src/seektalent/installed_slot.py"
      - "src/seektalent/owned_sidecar_process.py"
      - "src/seektalent/release_manifest.py"
      - "src/seektalent/release_signing.py"
      - "src/seektalent/sidecar_bootstrap.py"
      - "src/seektalent/sidecar_child_session.py"
      - "src/seektalent/sidecar_handshake_protocol.py"
      - "src/seektalent/sidecar_readiness.py"
      - "src/seektalent/source_port/_command_journal_engine.py"
      - "src/seektalent/source_port/_command_journal_types.py"
      - "src/seektalent/source_port/command_journal.py"
      - "src/seektalent/source_port/history_sqlite_reader.py"
      - "pyproject.toml"
      - "tests/test_source_port_command_journal.py"
      - "uv.lock"
      - "docs/plans/external-execution-plane-v1-release-artifact-evidence.md"
      - "docs/decisions/**"

permissions:
  contents: read

jobs:
  build-exact-wtscli-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the exact merged SeekTalent WTSCLI bundle source
        uses: actions/checkout@v5
        with:
          repository: FrankQDWang/wtscli
          ref: 709622fc3fb3463f15551467fdf0d28571dfd049
          path: wtscli-fork

      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"

      - name: Build the exact merged WTSCLI bundle
        working-directory: wtscli-fork
        run: |
          npm ci --ignore-scripts
          npm --prefix extension ci --ignore-scripts
          npm run build:seektalent-bundle -- --out "$GITHUB_WORKSPACE/wtscli-browser-bridge"

      - name: Upload the exact merged WTSCLI bundle
        uses: actions/upload-artifact@v4
        with:
          name: exact-wtscli-browser-bridge
          path: wtscli-browser-bridge
          if-no-files-found: error
          retention-days: 14

  native-launch-binding:
    name: ${{ matrix.name }}
    needs: build-exact-wtscli-bundle
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-2025 x64
            runner: windows-2025
            expected_os: Windows
            expected_arch: x86_64
          - name: macos-15 arm64
            runner: macos-15
            expected_os: Darwin
            expected_arch: arm64
          - name: macos-15-intel x86_64
            runner: macos-15-intel
            expected_os: Darwin
            expected_arch: x86_64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "22.14.0"

      - name: Assert native runner identity
        shell: python
        run: |
          import platform

          machine = {
              "amd64": "x86_64",
              "x86_64": "x86_64",
              "aarch64": "arm64",
              "arm64": "arm64",
          }.get(platform.machine().lower())
          assert platform.system() == "${{ matrix.expected_os }}"
          assert machine == "${{ matrix.expected_arch }}"

      - name: Run native probe
        shell: python
        run: |
          from pathlib import Path
          from subprocess import check_output
          import sys

          output = check_output([sys.executable, "tools/native_probes/launch_binding_probe.py", "--json"], text=True)
          print(output, end="")
          Path("native-launch-binding-evidence.json").write_text(output, encoding="utf-8")

      - name: Install test dependencies
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv sync --locked --group dev

      - name: Download the exact merged WTSCLI bundle
        uses: actions/download-artifact@v4
        with:
          name: exact-wtscli-browser-bridge
          path: wtscli-browser-bridge

      - name: Assert deterministic native evidence contract
        env:
          SEEKTALENT_NATIVE_LAUNCH_BINDING_EVIDENCE: native-launch-binding-evidence.json
        run: uv run --group dev python -m pytest tests/test_native_launch_binding_probe.py -q

      - name: Assert exact WTSCLI bundle admission and atomic install
        env:
          SEEKTALENT_EXACT_WTSCLI_BUNDLE: ${{ github.workspace }}/wtscli-browser-bridge
        run: uv run --group dev python -m pytest tests/test_wtscli_bundle_binding.py -q

      - name: Assert Windows command-journal directory publication durability
        if: runner.os == 'Windows'
        run: >-
          uv run --group dev python -m pytest
          tests/test_source_port_command_journal.py::test_windows_initialized_database_persistence_executes_the_native_flush_path
          tests/test_source_port_command_journal.py::test_windows_create_command_journal_persists_initialized_database
          tests/test_source_port_command_journal.py::test_windows_directory_persistence_executes_the_native_flush_path
          -q

      - name: Build and verify test-only packaged sidecar four-step handshake artifact
        env:
          PYTHONNOUSERSITE: "1"
        run: uv run --group dev python -m pytest tests/test_packaged_sidecar_artifact.py -q

      - name: Assert native active-slot lifecycle lease
        if: runner.os != 'Windows'
        run: uv run --group dev python -m pytest tests/test_installed_slot_lease.py -q

      - name: Assert Windows opened-object admission binding
        if: runner.os == 'Windows'
        run: >-
          uv run --group dev python -m pytest
          tests/test_windows_installed_binding.py
          tests/test_windows_sidecar_process.py
          tests/test_installed_slot_lease.py::test_native_cross_process_slot_lock_conflicts
          -q

      - name: Assert Windows sidecar polling transport lifecycle
        if: runner.os == 'Windows'
        run: >-
          uv run --group dev python -m pytest
          tests/test_sidecar_readiness.py::test_windows_reader_cancel_uses_thread_terminate_and_never_claims_failed_stop
          tests/test_sidecar_readiness.py::test_windows_polling_boundary_acks_a_legal_idle_pipe_without_cancellation
          tests/test_sidecar_readiness.py::test_windows_polling_boundary_maps_peek_failure_to_typed_pipe_failure
          tests/test_sidecar_readiness.py::test_windows_polling_boundary_waits_for_bytes_consumed_before_enqueue
          tests/test_sidecar_readiness.py::test_sidecar_rejects_every_main_ready_pipeline_tail_before_sidecar_ready
          tests/test_sidecar_readiness.py::test_child_result_close_cancels_its_reader_while_the_peer_stays_open
          tests/test_sidecar_readiness.py::test_collecting_child_result_cancels_its_reader_while_the_peer_stays_open
          tests/test_sidecar_readiness.py::test_child_result_close_unblocks_a_concurrent_parent_eof_wait
          -q

      - name: Upload native evidence
        uses: actions/upload-artifact@v4
        with:
          name: native-launch-binding-${{ matrix.runner }}
          path: native-launch-binding-evidence.json
          if-no-files-found: error
          retention-days: 14
