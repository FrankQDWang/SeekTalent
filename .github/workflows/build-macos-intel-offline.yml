name: Build macOS Intel Offline Bundle

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos-intel-offline:
    runs-on: macos-15-intel
    timeout-minutes: 30
    env:
      WTSCLI_VERSION: "0.1.0"
      WTSCLI_FORK_COMMIT: "60ae80db9ed96a0813eea12d5e24aa8e5c6ec863"

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Check out the pinned SeekTalent WTSCLI fork
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          repository: FrankQDWang/wtscli
          ref: ${{ env.WTSCLI_FORK_COMMIT }}
          path: wtscli-fork

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22.14.0"

      - name: Build the paired SeekTalent browser bridge
        working-directory: wtscli-fork
        run: |
          npm ci --ignore-scripts
          npm --prefix extension ci --ignore-scripts
          npm run build:seektalent-bundle -- --out "$RUNNER_TEMP/wtscli-browser-bridge"

      - name: Resolve release metadata
        run: |
          VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          WTSCLI_EXTENSION_VERSION="$(python -c 'import json, os, pathlib; print(json.loads((pathlib.Path(os.environ["RUNNER_TEMP"]) / "wtscli-browser-bridge/bridge-manifest.json").read_text())["extension"]["version"])')"
          WTSCLI_BRIDGE_BUILD_ID="$(python -c 'import json, os, pathlib; print(json.loads((pathlib.Path(os.environ["RUNNER_TEMP"]) / "wtscli-browser-bridge/bridge-manifest.json").read_text())["bridgeBuildId"])')"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "WTSCLI_EXTENSION_VERSION=${WTSCLI_EXTENSION_VERSION}" >> "$GITHUB_ENV"
          echo "WTSCLI_BRIDGE_BUILD_ID=${WTSCLI_BRIDGE_BUILD_ID}" >> "$GITHUB_ENV"
          echo "BUNDLE_NAME=seektalent-offline-${VERSION}-macos-x86_64-py313" >> "$GITHUB_ENV"

      - name: Require native Intel runner
        run: |
          test "$(uname -m)" = "x86_64"
          python - <<'PY'
          import platform
          import sys

          assert platform.system() == "Darwin", platform.system()
          assert platform.machine() == "x86_64", platform.machine()
          assert sys.version_info[:2] == (3, 13), sys.version
          PY

      - name: Build Intel offline bundle
        run: |
          python scripts/build_offline_macos_intel.py \
            --output-dir dist \
            --version "$VERSION" \
            --opencli-version "$WTSCLI_VERSION" \
            --opencli-bundle-dir "$RUNNER_TEMP/wtscli-browser-bridge"

      - name: Verify archive and bundled checksums
        run: |
          (cd dist && shasum -a 256 -c "${BUNDLE_NAME}.zip.sha256")
          rm -rf "$RUNNER_TEMP/seektalent-intel-bundle"
          mkdir -p "$RUNNER_TEMP/seektalent-intel-bundle"
          unzip -q "dist/${BUNDLE_NAME}.zip" -d "$RUNNER_TEMP/seektalent-intel-bundle"
          cd "$RUNNER_TEMP/seektalent-intel-bundle/${BUNDLE_NAME}"
          shasum -a 256 -c SHA256SUMS
          test -f "chrome-extension/wtscli-extension-v${WTSCLI_EXTENSION_VERSION}.zip"

      - name: Smoke-test offline install
        env:
          HTTP_PROXY: http://127.0.0.1:9
          HTTPS_PROXY: http://127.0.0.1:9
          ALL_PROXY: http://127.0.0.1:9
          NO_PROXY: ""
        run: |
          export http_proxy="$HTTP_PROXY"
          export https_proxy="$HTTPS_PROXY"
          export all_proxy="$ALL_PROXY"
          export no_proxy="$NO_PROXY"
          export DOMI_PYTHON="$(command -v python)"
          export DOMI_NODE="$(command -v node)"
          export BUNDLE_ROOT="$RUNNER_TEMP/seektalent-intel-bundle/${BUNDLE_NAME}"
          export TEST_HOME="$RUNNER_TEMP/seektalent-intel-home"
          rm -rf "$TEST_HOME"
          mkdir -p "$TEST_HOME"
          HOME="$TEST_HOME" bash -euo pipefail <<'BASH'
          source "$BUNDLE_ROOT/install-offline.sh"
          test "$(seektalent --version)" = "$VERSION"

          WTSCLI_MAIN="$HOME/.seektalent/opencli-runtime/opencli/$WTSCLI_VERSION/node_modules/@jackwener/opencli/dist/src/main.js"
          test "$("$DOMI_NODE" "$WTSCLI_MAIN" --version)" = "$WTSCLI_VERSION"

          EXTENSION_MANIFEST="$HOME/.seektalent/chrome-extension/opencli/manifest.json"
          test -f "$EXTENSION_MANIFEST"
          test -f "$HOME/.seektalent/chrome-extension/opencli/dist/background.js"
          test "$("$DOMI_PYTHON" -c 'import json, pathlib, sys; print(json.loads(pathlib.Path(sys.argv[1]).read_text())["version"])' "$EXTENSION_MANIFEST")" = "$WTSCLI_EXTENSION_VERSION"

          BRIDGE_MANIFEST="$HOME/.seektalent/browser-bridge/bridge-manifest.json"
          test -f "$BRIDGE_MANIFEST"
          test "$("$DOMI_PYTHON" -c 'import json, pathlib, sys; print(json.loads(pathlib.Path(sys.argv[1]).read_text())["bridgeBuildId"])' "$BRIDGE_MANIFEST")" = "$WTSCLI_BRIDGE_BUILD_ID"

          SITE_PACKAGES="$HOME/.seektalent/python-prefix/$VERSION/site-packages"
          PYTHONPATH="$SITE_PACKAGES" "$DOMI_PYTHON" - <<'PY'
          import _cffi_backend
          import charset_normalizer
          import cryptography
          import jiter
          import platform
          import pydantic_core
          import regex
          import rpds
          import sqlite3
          import tiktoken
          import yaml
          import seektalent

          assert platform.machine() == "x86_64", platform.machine()
          assert sqlite3.sqlite_version
          PY
          BASH

      - name: Record artifact checksum
        run: |
          cat "dist/${BUNDLE_NAME}.zip.sha256" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload Intel offline bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: seektalent-macos-intel-offline
          path: |
            dist/seektalent-offline-*-macos-x86_64-py313.zip
            dist/seektalent-offline-*-macos-x86_64-py313.zip.sha256
          if-no-files-found: error
          retention-days: 14
