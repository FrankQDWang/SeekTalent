name: Workbench Contract

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workbench-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check change scope
        id: scope
        run: python3 tools/ci_change_scope.py --event "$GITHUB_EVENT_NAME" --base "origin/${GITHUB_BASE_REF:-main}"
      - name: Skip Workbench contract
        if: steps.scope.outputs.workbench_contract != 'true'
        run: 'echo "Workbench contract skipped for change scope: ${{ steps.scope.outputs.reason }}"'
      - uses: actions/setup-python@v6
        if: steps.scope.outputs.workbench_contract == 'true'
        with:
          python-version: "3.12"
      - name: Install uv
        if: steps.scope.outputs.workbench_contract == 'true'
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: oven-sh/setup-bun@v2
        if: steps.scope.outputs.workbench_contract == 'true'
        with:
          bun-version: "1.3.13"
      - name: Install Python dependencies
        if: steps.scope.outputs.workbench_contract == 'true'
        run: uv sync --locked --group dev
      - name: Install Svelte dependencies
        if: steps.scope.outputs.workbench_contract == 'true'
        run: cd apps/web-svelte && bun install --frozen-lockfile
      - name: Install Playwright browsers
        if: steps.scope.outputs.workbench_contract == 'true'
        run: cd apps/web-svelte && bunx playwright install --with-deps chromium
      - name: Run Workbench contract
        if: steps.scope.outputs.workbench_contract == 'true'
        run: scripts/verify-dev-workbench.sh
      - name: Minimize uv cache
        if: always() && steps.scope.outputs.workbench_contract == 'true'
        run: uv cache prune --ci
