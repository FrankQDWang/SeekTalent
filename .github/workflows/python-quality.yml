name: Python Quality

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-scope:
    runs-on: ubuntu-latest
    outputs:
      python_quality: ${{ steps.scope.outputs.python_quality }}
      reason: ${{ steps.scope.outputs.reason }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Resolve PR base
        id: base
        env:
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          MERGE_GROUP_BASE_SHA: ${{ github.event.merge_group.base_sha || '' }}
        run: |
          for candidate in "$PULL_REQUEST_BASE_SHA" "$MERGE_GROUP_BASE_SHA" "origin/${GITHUB_BASE_REF:-main}" "origin/main"; do
            if [ -n "$candidate" ] && git rev-parse --verify "$candidate^{commit}" >/dev/null 2>&1; then
              echo "ref=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "Could not resolve base ref." >&2
          exit 1
      - name: Check change scope
        id: scope
        run: python3 tools/ci_change_scope.py --event "$GITHUB_EVENT_NAME" --base "${{ steps.base.outputs.ref }}"

  python-architecture:
    runs-on: ubuntu-latest
    needs: python-scope
    if: needs.python-scope.outputs.python_quality == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Check architecture imports
        run: uv run --group dev python tools/check_arch_imports.py
      - name: Check Tach baseline
        run: uv run --group dev python tools/check_tach_baseline.py
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  ruff:
    runs-on: ubuntu-latest
    needs: python-scope
    if: needs.python-scope.outputs.python_quality == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Ruff
        run: uv run --group dev ruff check src tests experiments tools
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  ty:
    runs-on: ubuntu-latest
    needs: python-scope
    if: needs.python-scope.outputs.python_quality == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Ty
        run: uv run --group dev ty check src tests tools
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  pytest:
    runs-on: ubuntu-latest
    needs: python-scope
    if: needs.python-scope.outputs.python_quality == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Pytest
        run: uv run --group dev python -m pytest -q -n auto --dist=loadfile
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  workbench-schema:
    runs-on: ubuntu-latest
    needs: python-scope
    if: needs.python-scope.outputs.python_quality == 'true'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Check Workbench dev/prod schema
        run: uv run --group dev python tools/check_workbench_schema_modes.py
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  quality-python:
    runs-on: ubuntu-latest
    needs: [python-scope, python-architecture, ruff, ty, pytest, workbench-schema]
    if: always()
    steps:
      - name: Require Python quality checks
        env:
          RUN_PYTHON_QUALITY: ${{ needs.python-scope.outputs.python_quality }}
          PYTHON_ARCHITECTURE: ${{ needs.python-architecture.result }}
          RUFF: ${{ needs.ruff.result }}
          TY: ${{ needs.ty.result }}
          PYTEST: ${{ needs.pytest.result }}
          WORKBENCH_SCHEMA: ${{ needs.workbench-schema.result }}
          CHANGE_SCOPE_REASON: ${{ needs.python-scope.outputs.reason }}
        run: |
          if [ "$RUN_PYTHON_QUALITY" != "true" ]; then
            echo "Python quality skipped for change scope: $CHANGE_SCOPE_REASON"
            exit 0
          fi
          test "$PYTHON_ARCHITECTURE" = "success"
          test "$RUFF" = "success"
          test "$TY" = "success"
          test "$PYTEST" = "success"
          test "$WORKBENCH_SCHEMA" = "success"
