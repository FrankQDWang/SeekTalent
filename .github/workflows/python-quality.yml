name: Python Quality

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/python-quality.yml"
      - "apps/**"
      - "experiments/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "tools/**"
      - "pyproject.toml"
      - "tach.toml"
      - "uv.lock"
  pull_request:
    paths:
      - ".github/workflows/python-quality.yml"
      - "apps/**"
      - "experiments/**"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "tools/**"
      - "pyproject.toml"
      - "tach.toml"
      - "uv.lock"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Resolve change base
        id: base
        env:
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
        run: |
          for candidate in "$PULL_REQUEST_BASE_SHA" "$PUSH_BEFORE_SHA" "HEAD^" "origin/main"; do
            if [ -n "$candidate" ] && git rev-parse --verify "$candidate^{commit}" >/dev/null 2>&1; then
              echo "ref=$candidate" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "Could not resolve base ref." >&2
          exit 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Ruff
        run: uv run --group dev ruff check src tests experiments tools
      - name: Ty
        run: uv run --group dev ty check src tests tools
      - name: Check architecture imports
        run: uv run --group dev python tools/check_arch_imports.py
      - name: Check Workbench dev/prod schema
        run: uv run --group dev python tools/check_workbench_schema_modes.py
      - name: Run privacy quick diff scan
        run: python3 tools/check_privacy_gate.py --base "${{ steps.base.outputs.ref }}"
      - name: Run agent safety quick diff scan
        run: python3 tools/check_agent_safety_gate.py --base "${{ steps.base.outputs.ref }}"
