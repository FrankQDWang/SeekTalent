name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Check architecture imports
        run: uv run --group dev python tools/check_arch_imports.py
      - name: Check Tach baseline
        run: uv run --group dev python tools/check_tach_baseline.py
      - name: Ruff
        run: uv run --group dev ruff check src tests experiments tools
      - name: Ty
        run: uv run --group dev ty check src tests tools
      - name: Pytest
        run: uv run --group dev python -m pytest -q
      - name: Check Workbench dev/prod schema
        run: uv run --group dev python tools/check_workbench_schema_modes.py
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  workbench-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - name: Install Python dependencies
        run: uv sync --locked --group dev
      - name: Install Svelte dependencies
        run: cd apps/web-svelte && bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: cd apps/web-svelte && bunx playwright install --with-deps chromium
      - name: Run Workbench contract
        run: scripts/verify-dev-workbench.sh
      - name: Minimize uv cache
        if: always()
        run: uv cache prune --ci

  pr-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install dependencies
        run: uv sync --locked --group dev
      - name: Prepare base branch PR gates
        run: |
          base_ref="origin/${GITHUB_BASE_REF:-main}"
          gate_dir="/tmp/seektalent-pr-gates"
          mkdir -p "$gate_dir"
          git show "$base_ref:tools/check_pr_governance.py" > "$gate_dir/check_pr_governance.py"
          git show "$base_ref:tools/check_privacy_gate.py" > "$gate_dir/check_privacy_gate.py"
          git show "$base_ref:tools/check_ai_bad_smells.py" > "$gate_dir/check_ai_bad_smells.py"
      - name: Run PR governance
        env:
          GOVERNANCE_BOOTSTRAP: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'governance-bootstrap') }}
        run: |
          base_arg="origin/${GITHUB_BASE_REF:-main}"
          if uv run --group dev python /tmp/seektalent-pr-gates/check_pr_governance.py --base "$base_arg"; then
            exit 0
          fi
          if [ "$GOVERNANCE_BOOTSTRAP" = "true" ]; then
            echo "Base governance failed; validating proposed governance gate."
            uv run --group dev python tools/check_pr_governance.py --base "$base_arg"
            exit 0
          fi
          exit 1
      - name: Run privacy gate
        run: uv run --group dev python /tmp/seektalent-pr-gates/check_privacy_gate.py --base "origin/${GITHUB_BASE_REF:-main}"
      - name: Run AI bad-smell gate
        run: uv run --group dev python /tmp/seektalent-pr-gates/check_ai_bad_smells.py --base "origin/${GITHUB_BASE_REF:-main}"

  test:
    runs-on: ubuntu-latest
    needs: [quality-python, workbench-contract, pr-governance]
    if: always()
    steps:
      - name: Require split checks
        env:
          QUALITY_PYTHON: ${{ needs.quality-python.result }}
          WORKBENCH_CONTRACT: ${{ needs.workbench-contract.result }}
          PR_GOVERNANCE: ${{ needs.pr-governance.result }}
        run: |
          test "$QUALITY_PYTHON" = "success"
          test "$WORKBENCH_CONTRACT" = "success"
          test "$PR_GOVERNANCE" = "success"
