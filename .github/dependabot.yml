version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - security

  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - security

  - package-ecosystem: npm
    directory: "/apps/web-react"
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - security
